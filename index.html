<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="记饮食" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#eef6ee" />
    <title>我的饮食</title>
    <link rel="apple-touch-icon" sizes="180x180" href="./assets/apple-touch-icon-180.png" />
    <link rel="icon" type="image/svg+xml" href="./assets/favicon.svg" />
    <style>
      :root {
        --bg: #f5f6ef;
        --bg-glow: radial-gradient(circle at 8% 12%, #d7f2d8 0%, rgba(215, 242, 216, 0) 36%),
          radial-gradient(circle at 88% 2%, #ffe7c8 0%, rgba(255, 231, 200, 0) 40%),
          linear-gradient(150deg, #f7f5ea 0%, #eef6ee 42%, #eef4f7 100%);
        --card: rgba(255, 255, 255, 0.92);
        --text-main: #18231f;
        --text-secondary: rgba(24, 35, 31, 0.7);
        --text-muted: rgba(24, 35, 31, 0.5);
        --divider: rgba(15, 31, 24, 0.08);
        --green: #24b37e;
        --green-strong: #1ea772;
        --token-progress-primary: var(--green);
        --token-progress-primary-strong: var(--green-strong);
        --token-progress-macro-protein: var(--token-progress-primary);
        --option-size: 14px;
        --option-weight: 400;
        --option-color: var(--text-secondary);
        --small-text-size: 14px;
        --small-text-weight: 400;
        --small-text-color: var(--text-secondary);
        --tiny-text-size: 12px;
        --nav-safe-height: calc(56px + env(safe-area-inset-top, 0px));
        --top-bar-bg: #eef6ee;
        --nav-scroll-progress: 0;
        --sheet-motion-duration: 0.3375s;
        --sheet-motion-ease: cubic-bezier(0.4, 0, 0.2, 1);
      }

      * { box-sizing: border-box; }
      html { -webkit-text-size-adjust: 100%; }
      * { -webkit-tap-highlight-color: transparent; }
      html, body {
        scrollbar-width: none;
        -ms-overflow-style: none;
      }
      html::-webkit-scrollbar,
      body::-webkit-scrollbar {
        display: none;
        width: 0;
        height: 0;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background-color: var(--top-bar-bg);
        background: var(--bg-glow);
        color: var(--text-main);
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", "PingFang SC", "Helvetica Neue", Arial, sans-serif;
      }

      button, input, textarea, select {
        font-family: inherit;
      }

      .mi {
        line-height: 1;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        vertical-align: middle;
      }
      .icon-regular {}
      .action-icon { font-size: 21px; }

      .page {
        max-width: 420px;
        margin: 0 auto;
        min-height: 100vh;
        padding-bottom: 138px;
        scrollbar-width: none;
        -ms-overflow-style: none;
      }
      .page::-webkit-scrollbar { display: none; width: 0; height: 0; }
      .hero {
        margin: 6px 12px 0;
        border-radius: 18px;
        padding: 16px;
        background: linear-gradient(140deg, rgba(255, 255, 255, 0.92) 0%, rgba(245, 253, 249, 0.9) 100%);
        border: 1px solid rgba(255, 255, 255, 0.8);
      }
      .hero-nav-shell {
        margin: 0 12px;
        padding: 0 6px;
        display: none;
      }

      .hero-title {
        font-size: 14px;
        font-weight: 400;
        color: #98a1aa;
      }

      .hero-main {
        margin-top: 8px;
        display: flex;
        justify-content: space-between;
        align-items: flex-end;
        gap: 12px;
      }

      .hero-kcal {
        font-size: 34px;
        line-height: 1;
        letter-spacing: -0.6px;
        font-weight: 700;
        display: inline-flex;
        align-items: baseline;
        gap: 4px;
        font-variant-numeric: tabular-nums;
      }
      .slot-counter {
        display: inline-flex;
        align-items: baseline;
        font-variant-numeric: tabular-nums;
      }
      .slot-char {
        display: inline-block;
        min-width: 0.58em;
        text-align: center;
      }
      .slot-wheel {
        position: relative;
        display: inline-block;
        height: 1em;
        overflow: hidden;
        min-width: 0.58em;
        text-align: center;
      }
      .slot-track {
        display: flex;
        flex-direction: column;
        align-items: center;
        will-change: transform;
      }
      .slot-digit {
        height: 1em;
        line-height: 1;
      }

      .hero-kcal small {
        font-size: 14px;
        color: #98a1aa;
        font-weight: 400;
        line-height: 1;
      }
      .hero-meta {
        font-size: 14px;
        color: #98a1aa;
        font-weight: 400;
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 6px 10px;
        border-radius: 999px;
        background: rgba(36, 179, 126, 0.1);
      }

      .hero-goal-row {
        margin-top: 10px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }
      .hero-goal-text {
        font-size: 14px;
        color: #98a1aa;
        font-weight: 400;
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }
      .hero-goal-edit-btn {
        width: 22px;
        height: 22px;
        border: 0;
        border-radius: 999px;
        background: rgba(24, 35, 31, 0.08);
        color: var(--text-secondary);
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }
      .hero-goal-input {
        width: 100%;
        height: 44px;
        border: 1px solid rgba(0, 0, 0, 0.12);
        border-radius: 10px;
        padding: 0 12px;
        font-size: 16px;
      }
      .hero-goal-save {
        height: 44px;
        border: 0;
        border-radius: 999px;
        padding: 0 16px;
        font-size: 14px;
        color: #fff;
        background: linear-gradient(130deg, var(--green) 0%, var(--green-strong) 100%);
      }
      .goal-sheet-body {
        padding: 6px 16px 18px;
        display: grid;
        gap: 10px;
      }
      .goal-sheet-note {
        font-size: 12px;
        color: var(--text-muted);
      }
      .goal-sheet-actions {
        display: flex;
        gap: 8px;
      }
      .hero-progress {
        margin-top: 8px;
        height: 8px;
        border-radius: 999px;
        background: rgba(24, 35, 31, 0.1);
        overflow: hidden;
      }
      .hero-progress-fill {
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(130deg, var(--token-progress-primary) 0%, var(--token-progress-primary-strong) 100%);
        transition: width 0.24s ease;
      }
      .hero-progress-fill.danger {
        background: linear-gradient(130deg, #ff6767 0%, #f04444 100%);
      }
      .hero-macro-grid {
        margin-top: 14px;
        padding-top: 12px;
        border-top: 0;
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 44px;
      }
      .hero-macro-card {
        min-width: 0;
        display: grid;
        row-gap: 10px;
      }
      .hero-macro-name {
        line-height: 1.2;
      }
      .hero-macro-track {
        height: 6px;
        border-radius: 999px;
        background: rgba(18, 18, 18, 0.08);
        overflow: hidden;
      }
      .hero-macro-fill {
        height: 100%;
        border-radius: inherit;
        transition: width 0.25s ease;
      }
      .hero-macro-fill.carb,
      .hero-macro-fill.fat {
        background: var(--token-progress-primary);
      }
      .hero-macro-fill.protein {
        background: var(--token-progress-macro-protein);
      }
      .hero-macro-fill.over {
        background: #eb4a5f;
      }
      .hero-macro-fill.unknown {
        background: rgba(24, 35, 31, 0.18);
      }
      .hero-macro-value {
        display: flex;
        align-items: baseline;
        gap: 2px;
        font-variant-numeric: tabular-nums;
      }
      .hero-macro-current {
        line-height: 1;
      }
      .hero-macro-sep {
        line-height: 1;
      }
      .hero-macro-target {
        line-height: 1;
      }
      .hero-macro-unit {
        margin-left: 2px;
        line-height: 1;
      }

      .hero-nav {
        margin-top: 10px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
      }

      .hero-nav-btn {
        width: 34px;
        height: 34px;
        border: 0;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.72);
        color: var(--text-main);
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }

      .hero-date-btn {
        width: 176px;
        border: 0;
        height: 34px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.72);
        color: var(--text-secondary);
        font-size: 14px;
        font-weight: 400;
        font-family: inherit;
        opacity: 1;
        padding: 0 14px;
        white-space: nowrap;
        text-align: center;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .hero-date-wrap {
        position: relative;
        flex: 0 0 auto;
        min-width: 176px;
      }
      .calendar-sheet-body {
        padding: 4px 12px 10px;
        display: grid;
        gap: 6px;
      }
      .calendar-week-header {
        display: grid;
        grid-template-columns: repeat(7, minmax(0, 1fr));
        align-items: center;
        justify-items: center;
        padding: 0 0 2px;
      }
      .calendar-week-day {
        font-size: 11px;
        line-height: 1;
        font-weight: 600;
        color: rgba(24, 35, 31, 0.46);
      }
      .calendar-month-head {
        display: grid;
        grid-template-columns: 36px auto 36px;
        align-items: center;
        justify-content: start;
        gap: 0;
      }
      .calendar-month-head-title {
        width: calc(100% - 32px);
        max-width: calc(100vw - 128px);
        margin-left: -6px;
      }
      .calendar-month-label {
        font-size: 16px;
        font-weight: 600;
        color: var(--text-main);
        text-align: center;
        white-space: nowrap;
        line-height: 1;
      }
      .calendar-month-switch {
        width: 36px;
        height: 36px;
        border: 0;
        border-radius: 0;
        background: transparent;
        color: var(--text-main);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0;
      }
      .calendar-month-switch .mi {
        font-size: 22px;
      }
      .calendar-bubble-grid {
        display: grid;
        grid-template-columns: repeat(7, minmax(0, 1fr));
        grid-template-rows: repeat(6, 44px);
        gap: 0;
        height: 264px;
        align-items: center;
        justify-items: center;
        overflow: visible;
      }
      .calendar-bubble-grid.slide-next {
        animation: calendar-slide-next 0.24s cubic-bezier(0.22, 0.9, 0.34, 1);
      }
      .calendar-bubble-grid.slide-prev {
        animation: calendar-slide-prev 0.24s cubic-bezier(0.22, 0.9, 0.34, 1);
      }
      @keyframes calendar-slide-next {
        from {
          opacity: 0.72;
          transform: translateX(16px);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }
      @keyframes calendar-slide-prev {
        from {
          opacity: 0.72;
          transform: translateX(-16px);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }
      .calendar-day {
        border: 0;
        background: transparent;
        padding: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 44px;
        overflow: visible;
        position: relative;
      }
      .calendar-bubble {
        width: var(--bubble-size, 28px);
        height: var(--bubble-size, 28px);
        aspect-ratio: 1 / 1;
        border-radius: 50%;
        flex: 0 0 auto;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 12px;
        font-weight: 700;
        line-height: 1;
        font-variant-numeric: tabular-nums;
        font-feature-settings: "tnum" 1;
        color: #166c4b;
        background: rgba(36, 179, 126, 0.22);
        position: relative;
        z-index: 1;
      }
      .calendar-bubble.danger {
        color: #9f2f42;
        background: rgba(240, 68, 68, 0.18);
      }
      .calendar-day-plain {
        font-size: 12px;
        line-height: 1;
        font-variant-numeric: tabular-nums;
        font-feature-settings: "tnum" 1;
        color: rgba(24, 35, 31, 0.66);
        font-weight: 600;
        position: relative;
        z-index: 1;
      }
      .calendar-day.current::before {
        content: "";
        position: absolute;
        width: 54px;
        height: 54px;
        border-radius: 50%;
        border: 1px solid rgba(24, 35, 31, 0.24);
        pointer-events: none;
      }
      .calendar-day.current .calendar-day-plain {
        color: var(--text-main);
        font-weight: 700;
      }
      .calendar-day-empty {
        pointer-events: none;
      }

      .nav {
        height: var(--nav-safe-height);
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        padding: env(safe-area-inset-top, 0px) 12px 0;
        position: sticky;
        top: 0;
        z-index: 3;
        background: transparent;
        isolation: isolate;
      }

      .nav::before {
        content: "";
        position: absolute;
        left: 0;
        right: 0;
        top: calc(-1 * env(safe-area-inset-top, 0px));
        bottom: 0;
        pointer-events: none;
        background: rgba(255, 255, 255, calc(0.04 + var(--nav-scroll-progress) * 0.92));
        backdrop-filter: blur(calc(4px + var(--nav-scroll-progress) * 12px));
        -webkit-backdrop-filter: blur(calc(4px + var(--nav-scroll-progress) * 12px));
        z-index: -1;
      }

      .title {
        margin: 0;
        font-size: 18px;
        line-height: 1;
        font-weight: 800;
        letter-spacing: 0.2px;
      }

      .nav-settings {
        position: absolute;
        right: 14px;
        bottom: 11px;
        width: 34px;
        height: 34px;
        border: 0;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.86);
        color: rgba(24, 35, 31, 0.76);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: transform 0.18s ease;
      }

      .nav-settings:active { transform: scale(0.94); }

      .menu-overlay {
        position: fixed;
        inset: 0;
        z-index: 25;
      }

      .settings-menu {
        position: fixed;
        right: calc((100vw - min(420px, 100vw)) / 2 + 14px);
        top: 68px;
        width: 168px;
        background: rgba(255, 255, 255, 0.98);
        border: 1px solid rgba(0, 0, 0, 0.08);
        border-radius: 12px;
        padding: 6px;
        z-index: 26;
      }

      .menu-item {
        width: 100%;
        height: 38px;
        border: 0;
        border-radius: 8px;
        background: transparent;
        text-align: left;
        padding: 0 10px;
        color: var(--text-main);
        font-size: 13px;
      }

      .menu-item:active {
        background: rgba(0, 0, 0, 0.05);
      }

      .content {
        padding: 8px 12px 0;
        display: flex;
        flex-direction: column;
        gap: 10px;
        scrollbar-width: none;
        -ms-overflow-style: none;
      }
      .content::-webkit-scrollbar { display: none; width: 0; height: 0; }

      .day-group {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .day-title {
        margin: 6px 2px 0;
        font-size: 13px;
        font-weight: 600;
        color: var(--text-secondary);
      }

      .meal {
        background: var(--card);
        border-radius: 16px;
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.75);
        animation: fadeInUp 0.35s ease both;
        transition: transform 0.22s ease;
      }

      .meal:hover {
        transform: translateY(-2px);
      }

      .meal-head {
        padding: 15px 15px 14px;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .meal-type { display: flex; align-items: center; gap: 12px; }

      .meal-icon {
        width: 26px;
        height: 26px;
        border-radius: 999px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        color: #fff;
      }
      .meal-icon .mi {
      }

      .breakfast { background: linear-gradient(140deg, #f0a240 0%, #ed8957 100%); }
      .lunch { background: linear-gradient(140deg, #e98563 0%, #d26d4e 100%); }
      .dinner { background: linear-gradient(140deg, #5a77ea 0%, #4963d4 100%); }

      .meal-name { font-size: 16px; font-weight: 600; }
      .head-value {
        display: inline-flex;
        align-items: baseline;
        justify-content: flex-end;
        gap: 4px;
        font-size: 14px;
        font-variant-numeric: tabular-nums;
      }
      .head-value .main {
        color: var(--text-main);
        font-weight: 600;
        line-height: 1;
      }
      .head-value .muted {
        color: var(--small-text-color);
        line-height: 1;
        font-size: var(--small-text-size);
        font-weight: var(--small-text-weight);
      }

      .item {
        padding: 14px 15px;
        min-height: 58px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 22px;
        transition: background 0.16s ease;
        background: rgba(255, 255, 255, 0.96);
        transform: translateX(0);
        transition: transform 0.2s ease, background 0.16s ease;
        position: relative;
        z-index: 2;
      }

      .item:active { background: rgba(36, 179, 126, 0.05); }

      .item-swipe {
        position: relative;
        overflow: hidden;
        border-top: 1px solid var(--divider);
        touch-action: pan-y;
      }

      .item-swipe.open .item {
        transform: translateX(-78px);
      }

      .item-action {
        position: absolute;
        right: 0;
        top: 0;
        bottom: 0;
        width: 78px;
        display: flex;
        align-items: stretch;
        justify-content: stretch;
        z-index: 3;
        transform: translateX(100%);
        transition: transform 0.2s ease;
        pointer-events: none;
      }

      .item-swipe.open .item-action {
        transform: translateX(0);
        pointer-events: auto;
      }

      .item-delete-btn {
        width: 100%;
        border: 0;
        color: #fff;
        font-size: 13px;
        font-weight: 600;
        background: linear-gradient(160deg, #ff5a56 0%, #ea3f3f 100%);
      }

      .food {
        color: var(--text-secondary);
        font-size: 14px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      /* Keep top summary small text exactly aligned with list text style. */
      .hero-title,
      .hero-kcal small,
      .hero-meta,
      .hero-goal-text,
      .hero-macro-name,
      .hero-macro-current,
      .hero-macro-current.unknown,
      .hero-macro-sep,
      .hero-macro-target,
      .hero-macro-unit {
        color: var(--text-secondary);
        font-size: 12px;
        font-weight: 400;
        font-family: inherit;
        opacity: 1;
      }

      .food-wrap {
        flex: 1;
        min-width: 0;
      }

      .kcal {
        flex-shrink: 0;
        color: var(--small-text-color);
        font-size: var(--small-text-size);
        font-weight: var(--small-text-weight);
        display: flex;
        align-items: center;
        gap: 2px;
      }

      .empty {
        margin: 38px 12px 0;
        padding: 24px 18px;
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.76);
        border: 1px dashed rgba(24, 35, 31, 0.14);
        text-align: center;
        color: var(--text-muted);
      }

      .empty .mi {
        font-size: 26px;
        margin-bottom: 8px;
        color: rgba(36, 179, 126, 0.82);
      }

      .footer {
        --footer-pad-y: 18px;
        position: fixed;
        left: 50%;
        transform: translateX(-50%);
        bottom: 0;
        width: min(420px, 100vw);
        background: transparent;
        padding: var(--footer-pad-y) 20px calc(var(--footer-pad-y) + env(safe-area-inset-bottom, 0px));
        z-index: 4;
        isolation: isolate;
      }

      .footer::before {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
        background: rgba(255, 255, 255, 0.01);
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
        z-index: -1;
      }
      .return-today-fab {
        position: absolute;
        left: 50%;
        bottom: calc(var(--footer-pad-y) + env(safe-area-inset-bottom, 0px) + 72px);
        height: 34px;
        padding: 0 14px;
        border: 0;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.94);
        color: rgba(24, 35, 31, 0.72);
        font-size: 12px;
        font-weight: 500;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 4px;
        box-shadow: 0 6px 16px rgba(10, 20, 16, 0.08);
        transform: translateX(-50%) translateY(56px) scale(0.84);
        pointer-events: none;
        z-index: 0;
        transition: transform 0.22s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        will-change: transform;
      }
      .return-today-fab.show {
        transform: translateX(-50%) translateY(0) scale(1);
        pointer-events: auto;
        animation: return-today-pop 0.42s cubic-bezier(0.22, 0.9, 0.24, 1);
      }
      .return-today-fab:active {
        transform: translateX(-50%) translateY(1px) scale(0.97);
      }
      @keyframes return-today-pop {
        0% {
          transform: translateX(-50%) translateY(56px) scale(0.84);
        }
        62% {
          transform: translateX(-50%) translateY(-2px) scale(1.03);
        }
        100% {
