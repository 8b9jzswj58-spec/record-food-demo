<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>我的饮食</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,500,0,0" />
    <style>
      :root {
        --bg: #f5f6ef;
        --bg-glow: radial-gradient(circle at 8% 12%, #d7f2d8 0%, rgba(215, 242, 216, 0) 36%),
          radial-gradient(circle at 88% 2%, #ffe7c8 0%, rgba(255, 231, 200, 0) 40%),
          linear-gradient(150deg, #f7f5ea 0%, #eef6ee 42%, #eef4f7 100%);
        --card: rgba(255, 255, 255, 0.92);
        --text-main: #18231f;
        --text-secondary: rgba(24, 35, 31, 0.7);
        --text-muted: rgba(24, 35, 31, 0.5);
        --divider: rgba(15, 31, 24, 0.08);
        --green: #24b37e;
        --green-strong: #1ea772;
        --shadow-soft: 0 12px 32px rgba(31, 67, 49, 0.08);
        --option-size: 14px;
        --option-weight: 400;
        --option-color: var(--text-secondary);
      }

      * { box-sizing: border-box; }
      html { -webkit-text-size-adjust: 100%; }
      * { -webkit-tap-highlight-color: transparent; }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg-glow);
        color: var(--text-main);
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", "PingFang SC", "Helvetica Neue", Arial, sans-serif;
      }

      button, input, textarea, select {
        font-family: inherit;
      }

      body::-webkit-scrollbar { display: none; }

      .mi {
        font-family: "Material Symbols Rounded";
        line-height: 1;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        vertical-align: middle;
      }
      .icon-regular {
        font-weight: 400;
        font-variation-settings: "wght" 400, "FILL" 0, "GRAD" 0, "opsz" 24;
      }
      .action-icon {
        font-size: 21px;
        font-weight: 400;
        font-variation-settings: "wght" 400, "FILL" 0, "GRAD" 0, "opsz" 24;
      }

      .page {
        max-width: 420px;
        margin: 0 auto;
        min-height: 100vh;
        padding-bottom: 138px;
      }

      .hero {
        margin: 6px 12px 0;
        border-radius: 18px;
        padding: 16px;
        background: linear-gradient(140deg, rgba(255, 255, 255, 0.92) 0%, rgba(245, 253, 249, 0.9) 100%);
        border: 1px solid rgba(255, 255, 255, 0.8);
        box-shadow: var(--shadow-soft);
      }

      .hero-title {
        font-size: 13px;
        color: var(--text-muted);
      }

      .hero-main {
        margin-top: 8px;
        display: flex;
        justify-content: space-between;
        align-items: flex-end;
        gap: 12px;
      }

      .hero-kcal {
        font-size: 34px;
        line-height: 1;
        letter-spacing: -0.6px;
        font-weight: 700;
      }

      .hero-kcal small {
        margin-left: 4px;
        font-size: 14px;
        color: var(--text-muted);
        font-weight: 500;
      }

      .hero-meta {
        font-size: 12px;
        color: var(--text-secondary);
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 6px 10px;
        border-radius: 999px;
        background: rgba(36, 179, 126, 0.1);
      }
      .hero-goal-row {
        margin-top: 10px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }
      .hero-goal-text {
        font-size: 12px;
        color: var(--text-secondary);
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }
      .hero-goal-edit-btn {
        width: 22px;
        height: 22px;
        border: 0;
        border-radius: 999px;
        background: rgba(24, 35, 31, 0.08);
        color: var(--text-secondary);
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }
      .hero-goal-edit {
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }
      .hero-goal-input {
        width: 82px;
        height: 28px;
        border: 1px solid rgba(0, 0, 0, 0.12);
        border-radius: 8px;
        padding: 0 8px;
        font-size: 13px;
      }
      .hero-goal-save {
        height: 28px;
        border: 0;
        border-radius: 999px;
        padding: 0 10px;
        font-size: 12px;
        color: #fff;
        background: var(--green-strong);
      }
      .hero-progress {
        margin-top: 8px;
        height: 8px;
        border-radius: 999px;
        background: rgba(24, 35, 31, 0.1);
        overflow: hidden;
      }
      .hero-progress-fill {
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(130deg, var(--green) 0%, var(--green-strong) 100%);
        transition: width 0.24s ease;
      }

      .hero-nav {
        margin-top: 12px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
      }

      .hero-nav-btn {
        width: 34px;
        height: 34px;
        border: 0;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.9);
        color: var(--text-main);
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }

      .hero-date-btn {
        width: 100%;
        border: 0;
        height: 34px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.92);
        color: var(--text-secondary);
        font-size: 13px;
        font-weight: 600;
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "PingFang SC", "Helvetica Neue", Arial, sans-serif;
      }

      .hero-date-wrap {
        position: relative;
        flex: 1;
        min-width: 0;
      }

      .hero-date-native {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        opacity: 0;
        border: 0;
        background: transparent;
      }

      .nav {
        height: 86px;
        display: flex;
        align-items: flex-end;
        justify-content: center;
        padding: 0 16px 14px;
        position: sticky;
        top: 0;
        z-index: 3;
        backdrop-filter: blur(10px);
      }

      .title {
        margin: 0;
        font-size: 18px;
        line-height: 1;
        font-weight: 800;
        letter-spacing: 0.2px;
      }

      .nav-settings {
        position: absolute;
        right: 14px;
        bottom: 8px;
        width: 34px;
        height: 34px;
        border: 0;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.86);
        box-shadow: var(--shadow-soft);
        color: rgba(24, 35, 31, 0.76);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: transform 0.18s ease;
      }

      .nav-settings:active { transform: scale(0.94); }

      .menu-overlay {
        position: fixed;
        inset: 0;
        z-index: 25;
      }

      .settings-menu {
        position: fixed;
        right: calc((100vw - min(420px, 100vw)) / 2 + 14px);
        top: 68px;
        width: 168px;
        background: rgba(255, 255, 255, 0.98);
        border: 1px solid rgba(0, 0, 0, 0.08);
        border-radius: 12px;
        box-shadow: 0 18px 34px rgba(15, 27, 21, 0.14);
        padding: 6px;
        z-index: 26;
      }

      .menu-item {
        width: 100%;
        height: 38px;
        border: 0;
        border-radius: 8px;
        background: transparent;
        text-align: left;
        padding: 0 10px;
        color: var(--text-main);
        font-size: 13px;
      }

      .menu-item:active {
        background: rgba(0, 0, 0, 0.05);
      }

      .content {
        padding: 8px 12px 0;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .day-group {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .day-title {
        margin: 6px 2px 0;
        font-size: 13px;
        font-weight: 600;
        color: var(--text-secondary);
      }

      .meal {
        background: var(--card);
        border-radius: 16px;
        overflow: hidden;
        box-shadow: var(--shadow-soft);
        border: 1px solid rgba(255, 255, 255, 0.75);
        animation: fadeInUp 0.35s ease both;
        transition: transform 0.22s ease, box-shadow 0.22s ease;
      }

      .meal:hover {
        transform: translateY(-2px);
        box-shadow: 0 16px 34px rgba(31, 67, 49, 0.12);
      }

      .meal-head {
        padding: 15px 15px 14px;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .meal-type { display: flex; align-items: center; gap: 12px; }

      .meal-icon {
        width: 26px;
        height: 26px;
        border-radius: 999px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        color: #fff;
      }

      .breakfast { background: linear-gradient(140deg, #f0a240 0%, #ed8957 100%); }
      .lunch { background: linear-gradient(140deg, #e98563 0%, #d26d4e 100%); }
      .dinner { background: linear-gradient(140deg, #5a77ea 0%, #4963d4 100%); }

      .meal-name { font-size: 16px; font-weight: 600; }
      .head-value { display: flex; align-items: center; gap: 3px; font-size: 14px; }
      .head-value .main { color: var(--text-main); font-weight: 600; }
      .head-value .muted { color: var(--text-muted); }

      .item {
        padding: 14px 15px;
        min-height: 58px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 22px;
        transition: background 0.16s ease;
        background: rgba(255, 255, 255, 0.96);
        transform: translateX(0);
        transition: transform 0.2s ease, background 0.16s ease;
        position: relative;
        z-index: 2;
      }

      .item:active { background: rgba(36, 179, 126, 0.05); }

      .item-swipe {
        position: relative;
        overflow: hidden;
        border-top: 1px solid var(--divider);
        touch-action: pan-y;
      }

      .item-swipe.open .item {
        transform: translateX(-78px);
      }

      .item-action {
        position: absolute;
        right: 0;
        top: 0;
        bottom: 0;
        width: 78px;
        display: flex;
        align-items: stretch;
        justify-content: stretch;
        z-index: 3;
        transform: translateX(100%);
        transition: transform 0.2s ease;
        pointer-events: none;
      }

      .item-swipe.open .item-action {
        transform: translateX(0);
        pointer-events: auto;
      }

      .item-delete-btn {
        width: 100%;
        border: 0;
        color: #fff;
        font-size: 13px;
        font-weight: 600;
        background: linear-gradient(160deg, #ff5a56 0%, #ea3f3f 100%);
      }

      .food {
        flex: 1;
        min-width: 0;
        color: var(--text-secondary);
        font-size: 14px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .kcal {
        flex-shrink: 0;
        color: var(--text-muted);
        font-size: 12px;
        display: flex;
        align-items: center;
        gap: 2px;
      }

      .empty {
        margin: 38px 12px 0;
        padding: 24px 18px;
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.76);
        border: 1px dashed rgba(24, 35, 31, 0.14);
        text-align: center;
        color: var(--text-muted);
      }

      .empty .mi {
        font-size: 26px;
        margin-bottom: 8px;
        color: rgba(36, 179, 126, 0.82);
      }

      .footer {
        position: fixed;
        left: 50%;
        transform: translateX(-50%);
        bottom: 0;
        width: min(420px, 100vw);
        background: linear-gradient(to top, #eff4ec 68%, rgba(239, 244, 236, 0));
        padding: 18px 20px 40px;
        z-index: 4;
        backdrop-filter: blur(8px);
      }

      .btn {
        width: 100%;
        height: 52px;
        border: 0;
        border-radius: 999px;
        background: linear-gradient(130deg, var(--green) 0%, var(--green-strong) 100%);
        color: #fff;
        font-size: 14px;
        font-weight: 700;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        box-shadow: 0 14px 30px rgba(36, 179, 126, 0.32);
        cursor: pointer;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
      }

      .btn:active {
        transform: translateY(1px) scale(0.99);
        box-shadow: 0 10px 20px rgba(36, 179, 126, 0.24);
      }

      .sheet-overlay {
        position: fixed;
        inset: 0;
        background: rgba(12, 20, 16, 0.26);
        display: flex;
        justify-content: center;
        align-items: flex-end;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.22s ease;
        z-index: 20;
        backdrop-filter: blur(2px);
      }

      .sheet-overlay.show { opacity: 1; pointer-events: auto; }
      .sheet-wrap {
        width: min(420px, 100vw);
        transform: translateY(24px);
        transition: transform 0.24s cubic-bezier(0.22, 0.9, 0.34, 1);
      }
      .sheet-overlay.show .sheet-wrap { transform: translateY(0); }

      .sheet-card {
        background: linear-gradient(180deg, #ffffff 0%, #fbfffd 100%);
        border-radius: 20px 20px 0 0;
        overflow: hidden;
        box-shadow: 0 -20px 38px rgba(20, 42, 31, 0.14);
        padding-bottom: env(safe-area-inset-bottom, 0);
        transform-origin: bottom center;
      }

      .sheet-head {
        padding: 18px 16px;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .sheet-head-actions {
        display: inline-flex;
        align-items: center;
        gap: 12px;
      }
      .history-btn {
        width: 34px;
        height: 34px;
        border: 0;
        border-radius: 0;
        background: transparent;
        color: rgba(0, 0, 0, 0.62);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0;
        transition: transform 0.16s ease, color 0.16s ease, opacity 0.16s ease;
      }
      .history-btn:not(:disabled):active { transform: scale(0.92); }
      .history-btn:disabled {
        opacity: 0.36;
      }

      .meal-prefix { font-size: 16px; font-weight: 600; }

      .close-btn {
        width: 30px;
        height: 30px;
        border: 0;
        border-radius: 999px;
        background: rgba(0, 0, 0, 0.04);
        color: rgba(0, 0, 0, 0.52);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0;
        transition: transform 0.16s ease, background-color 0.16s ease;
      }
      .close-icon {
        font-size: 22px;
      }
      .close-btn:active {
        transform: scale(0.94);
        background: rgba(0, 0, 0, 0.08);
      }

      .attach {
        padding: 10px 16px 16px;
        display: flex;
        gap: 10px;
        overflow-x: auto;
        scrollbar-width: none;
      }
      .attach::-webkit-scrollbar { display: none; }
      .attach.attach-empty { overflow-x: visible; }

      .input-section-title {
        font-size: 15px;
        font-weight: 700;
        color: var(--text-main);
      }

      .media-entry {
        padding: 12px 0 0;
      }

      .library-entry {
        padding: 12px 16px 14px;
      }

      .library-entry-title {
        width: 100%;
        border: 0;
        background: transparent;
        padding: 0;
        display: flex;
        align-items: center;
        justify-content: space-between;
        color: var(--text-main);
        text-align: left;
      }

      .library-entry-title-main {
        font-size: 15px;
        font-weight: 700;
      }

      .library-entry-quick-row::-webkit-scrollbar { display: none; }
      .library-entry-quick-row {
        margin-top: 8px;
        margin-left: -16px;
        margin-right: -16px;
        display: flex;
        gap: 8px;
        overflow-x: auto;
        scrollbar-width: none;
        padding: 2px 16px;
        scroll-padding-left: 16px;
        scroll-padding-right: 16px;
        scroll-snap-type: x proximity;
      }

      .library-sheet-overlay {
        position: fixed;
        inset: 0;
        background: rgba(12, 20, 16, 0.26);
        display: flex;
        justify-content: center;
        align-items: flex-end;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.2s ease;
        z-index: 32;
        backdrop-filter: blur(2px);
      }

      .library-sheet-overlay.show {
        opacity: 1;
        pointer-events: auto;
      }

      .library-sheet-wrap {
        width: min(420px, 100vw);
        transform: translateY(20px);
        transition: transform 0.22s cubic-bezier(0.22, 0.9, 0.34, 1);
      }

      .library-sheet-overlay.show .library-sheet-wrap {
        transform: translateY(0);
      }

      .library-sheet-card {
        background: #fff;
        border-radius: 20px 20px 0 0;
        height: 520px;
        padding-bottom: env(safe-area-inset-bottom, 0);
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }

      .library-sheet-head {
        height: 54px;
        padding: 0 16px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        border-bottom: 1px solid var(--divider);
      }

      .library-sheet-title {
        font-size: 16px;
        font-weight: 600;
      }

      .meal-quick-tabs {
        padding: 0 16px 10px;
        display: flex;
        gap: 8px;
      }

      .result-panel.show {
        padding-top: 4px;
      }

      .meal-quick-tab {
        flex: 1;
        min-width: 0;
        height: 38px;
        border: 1px solid rgba(0, 0, 0, 0.09);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.92);
        padding: 0 10px;
        font-size: var(--option-size);
        font-weight: var(--option-weight);
        color: var(--option-color);
        transition: transform 0.16s ease, background-color 0.2s ease, border-color 0.2s ease, color 0.2s ease;
      }
      .meal-quick-tab:active { transform: scale(0.98); }

      .meal-quick-tab.active {
        border-color: var(--green);
        background: rgba(36, 179, 126, 0.15);
        color: #0f4f37;
      }

      .library-list {
        flex: 1;
        overflow-y: auto;
        padding: 12px 16px 14px;
        display: grid;
        gap: 8px;
        scrollbar-width: none;
      }

      .library-list::-webkit-scrollbar { display: none; }

      .library-list-item {
        width: 100%;
        border: 1px solid rgba(0, 0, 0, 0.08);
        background: rgba(255, 255, 255, 0.95);
        border-radius: 10px;
        min-height: 54px;
        padding: 10px 12px;
        text-align: left;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        transition: transform 0.16s ease, background-color 0.2s ease, border-color 0.2s ease;
      }
      .library-list-item:active { transform: scale(0.985); }

      .library-list-item.selected {
        border-color: var(--green);
        background: rgba(36, 179, 126, 0.14);
      }

      .library-list-main {
        min-width: 0;
        flex: 1;
      }

      .library-list-title {
        font-size: 13px;
        color: var(--text-main);
        font-weight: 600;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .library-list-meta {
        margin-top: 3px;
        font-size: 11px;
        color: var(--text-muted);
      }

      .library-list-check {
        width: 18px;
        height: 18px;
        border-radius: 999px;
        border: 1px solid rgba(0, 0, 0, 0.2);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        color: #fff;
        background: transparent;
      }

      .library-list-item.selected .library-list-check {
        border-color: var(--green-strong);
        background: var(--green-strong);
      }

      .library-list-footer {
        border-top: 1px solid var(--divider);
        padding: 10px 16px;
      }

      .library-add-btn {
        width: 100%;
        height: 48px;
        border: 0;
        border-radius: 999px;
        color: #fff;
        background: linear-gradient(130deg, var(--green) 0%, var(--green-strong) 100%);
        font-size: 13px;
        font-weight: 600;
        transition: transform 0.16s ease, box-shadow 0.2s ease, opacity 0.2s ease;
        box-shadow: 0 10px 20px rgba(36, 179, 126, 0.22);
      }
      .library-add-btn:active { transform: scale(0.985); }

      .library-add-btn:disabled {
        opacity: 0.5;
      }

      .library-chip {
        border: 1px solid rgba(0, 0, 0, 0.1);
        background: rgba(255, 255, 255, 0.92);
        border-radius: 8px;
        min-height: 40px;
        padding: 0 14px;
        font-size: var(--option-size);
        font-weight: var(--option-weight);
        color: var(--option-color);
        white-space: nowrap;
        transition: transform 0.16s ease, background-color 0.2s ease, border-color 0.2s ease, color 0.2s ease;
        scroll-snap-align: start;
      }
      .library-chip:active { transform: scale(0.97); }

      .library-chip.selected {
        border-color: var(--green);
        background: rgba(36, 179, 126, 0.15);
        color: #0f4f37;
      }


      .attach-item {
        width: 66px;
        height: 66px;
        border: 1px solid rgba(0, 0, 0, 0.09);
        border-radius: 8px;
        background: transparent;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        color: var(--text-muted);
        font-size: 14px;
        flex-shrink: 0;
        position: relative;
        overflow: hidden;
        transition: transform 0.16s ease, border-color 0.2s ease, background-color 0.2s ease;
      }
      .attach-item:active { transform: scale(0.98); }

      .attach-item.has-image {
        border: 0;
      }

      .attach-option { flex: 1 0 0; min-width: 0; padding: 0 16px; }
      .attach-label { font-size: var(--option-size); font-weight: var(--option-weight); color: var(--option-color); }
      .attach-icon {
        font-size: calc(var(--option-size) * 1.5);
        font-weight: 400;
        font-variation-settings: "wght" 400, "FILL" 0, "GRAD" 0, "opsz" 24;
        color: var(--option-color);
        line-height: 1;
      }

      function blobToBase64(blob) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onloadend = () => {
            const result = String(reader.result || "");
            const base64 = result.includes(",") ? result.split(",")[1] : "";
            resolve(base64);
          };
          reader.onerror = reject;
          reader.readAsDataURL(blob);
        });
      }

      async function compressImageFile(file, options = {}) {
        const maxSide = options.maxSide || 1280;
        const quality = options.quality || 0.78;
        const mimeType = options.mimeType || "image/jpeg";
        let sourceWidth = 0;
        let sourceHeight = 0;
        let drawSource = null;

        if (typeof createImageBitmap === "function") {
          const bitmap = await createImageBitmap(file);
          sourceWidth = bitmap.width;
          sourceHeight = bitmap.height;
          drawSource = bitmap;
        } else {
          const imageUrl = URL.createObjectURL(file);
          const image = await new Promise((resolve, reject) => {
            const img = new Image();
            img.onload = () => resolve(img);
            img.onerror = reject;
            img.src = imageUrl;
          });
          sourceWidth = image.naturalWidth || image.width;
          sourceHeight = image.naturalHeight || image.height;
          drawSource = image;
          URL.revokeObjectURL(imageUrl);
        }

        const scale = Math.min(1, maxSide / Math.max(sourceWidth, sourceHeight));
        const targetWidth = Math.max(1, Math.round(sourceWidth * scale));
        const targetHeight = Math.max(1, Math.round(sourceHeight * scale));
        const canvas = document.createElement("canvas");
        canvas.width = targetWidth;
        canvas.height = targetHeight;
        const ctx = canvas.getContext("2d");
        ctx.drawImage(drawSource, 0, 0, targetWidth, targetHeight);

        const compressedBlob = await new Promise((resolve) => {
          canvas.toBlob((blob) => resolve(blob || file), mimeType, quality);
        });

        return {
          originalSize: file.size,
          compressedSize: compressedBlob.size || file.size,
          blob: compressedBlob,
          mimeType: compressedBlob.type || mimeType
        };
      }

      async function callGeminiParse({ meal, inputText, compressedAttachments }) {
        const imageParts = [];
        for (const item of compressedAttachments) {
          const base64 = await blobToBase64(item.blob);
          imageParts.push({ mimeType: item.mimeType || "image/jpeg", base64 });
        }

        const response = await fetch(SUPABASE_URL + "/functions/v1/parse-food", {
          method: "POST",
          headers: { ...SUPABASE_HEADERS },
          body: JSON.stringify({ meal, text: inputText, images: imageParts })
        });

        const data = await response.json();
        if (!response.ok) {
          throw new Error(data?.error || data?.message || "parse-food request failed");
        }
        if (!data?.ok) throw new Error(data?.error || "parse-food failed");
        return data?.data || {};

          const current = parsedEditSessionRef.current;
          if (!current.key || current.key !== sessionKey) return;
          const beforeSnapshot = cloneParsedItems(current.before || []);
          const afterSnapshot = cloneParsedItems(parsedResultsRef.current);
          parsedEditSessionRef.current = { key: "", before: null };
          if (JSON.stringify(beforeSnapshot) === JSON.stringify(afterSnapshot)) return;
          setParsedUndoStack((stack) => [...stack, beforeSnapshot]);
          setParsedRedoStack([]);
        }
        function flushParsedEditSession() {
          const current = parsedEditSessionRef.current;
          if (!current.key) return;
          endParsedEditSession(current.key);
        }
        function undoParsedChange() {
          setParsedUndoStack((undoStack) => {
            if (undoStack.length === 0) return undoStack;
            const prevSnapshot = undoStack[undoStack.length - 1];
            setParsedRedoStack((redoStack) => [...redoStack, cloneParsedItems(parsedResults)]);
            setParsedResults(cloneParsedItems(prevSnapshot));
            return undoStack.slice(0, -1);
          });
        }
        function redoParsedChange() {
          setParsedRedoStack((redoStack) => {
            if (redoStack.length === 0) return redoStack;
            const nextSnapshot = redoStack[redoStack.length - 1];
            setParsedUndoStack((undoStack) => [...undoStack, cloneParsedItems(parsedResults)]);
            setParsedResults(cloneParsedItems(nextSnapshot));
            return redoStack.slice(0, -1);
          });
        }
        useEffect(() => {
          pendingDeletionRef.current = pendingDeletion;
        }, [pendingDeletion]);

        useEffect(() => {
          const shouldLock = sheetOpen || librarySheetOpen || entryEditOpen || authVisible;
          if (!shouldLock) return;
          const prevOverflow = document.body.style.overflow;
          const prevTouchAction = document.body.style.touchAction;
          document.body.style.overflow = "hidden";
          document.body.style.touchAction = "none";
          return () => {
            document.body.style.overflow = prevOverflow;
            document.body.style.touchAction = prevTouchAction;
          };
        }, [sheetOpen, librarySheetOpen, entryEditOpen, authVisible]);

        function getRestHeaders(sessionArg = currentSession) {
          const token = sessionArg?.access_token || SUPABASE_ANON_KEY;
          return {
            ...SUPABASE_HEADERS,
            Authorization: "Bearer " + token
          };
        }

        function cleanupAttachments(next = attachments) {
          next.forEach((item) => {
            if (item?.url) URL.revokeObjectURL(item.url);
          });
        }

        function cloneRecords(srcRecords) {
          return srcRecords.map((record) => ({
            ...record,
            items: Array.isArray(record.items) ? record.items.map((item) => ({ ...item })) : []
          }));
        }

        function buildRecordsAfterDelete(srcRecords, recordIndex, itemIndex) {
          const next = cloneRecords(srcRecords);
          const targetRecord = next[recordIndex];
          if (!targetRecord || !Array.isArray(targetRecord.items) || !targetRecord.items[itemIndex]) return null;
          targetRecord.items.splice(itemIndex, 1);
          return next.filter((record) => Array.isArray(record.items) && record.items.length > 0);
        }

        async function initBackendState(nextUser = currentUser, nextSession = currentSession) {
          const cacheUserId = nextUser?.id || "guest";
          const cached = readCachedRecords(cacheUserId);
          if (cached.length > 0) {
            setRecords(cached);
          }
          if (!nextUser?.id) {
            if (cached.length === 0) setRecords([]);
            return;
          }
          try {
            const recordsRes = await fetch(
              SUPABASE_URL + "/rest/v1/diet_records?select=meal,items,created_at&order=created_at.asc",
              { headers: getRestHeaders(nextSession) }
            );
            if (recordsRes.ok) {
              const recRows = await recordsRes.json();
              const nextRecords = Array.isArray(recRows) ? recRows : [];
              setRecords(nextRecords);
              writeCachedRecords(nextUser.id, nextRecords);
            }
          } catch (error) {
            console.error("init-backend-failed", error);
          }
        }

        async function saveStoredRecords(nextRecords) {
          if (!currentUser?.id) throw new Error("未登录，无法保存");
          const userFilter = "?user_id=eq." + encodeURIComponent(currentUser.id);
          const response = await fetch(SUPABASE_URL + "/rest/v1/diet_records" + userFilter, {
            method: "DELETE",
            headers: getRestHeaders()
          });
          if (!response.ok) throw new Error("清空旧记录失败");
          if (nextRecords.length === 0) {
            setRecords([]);
            writeCachedRecords(currentUser.id, []);
            return;
          }
          const insertRes = await fetch(SUPABASE_URL + "/rest/v1/diet_records", {
            method: "POST",
            headers: { ...getRestHeaders(), Prefer: "return=representation" },
            body: JSON.stringify(
              nextRecords.map((record) => ({
                user_id: currentUser.id,
                meal: record.meal,
                items: Array.isArray(record.items) ? record.items : [],
                created_at: record.created_at || new Date().toISOString()
              }))
            )
          });
          if (!insertRes.ok) throw new Error("写入记录失败");
          const saved = await insertRes.json();
          const nextSaved = Array.isArray(saved) ? saved : [];
          setRecords(nextSaved);
          writeCachedRecords(currentUser.id, nextSaved);
        }

        async function pushFiles(fileList) {
          if (!fileList || fileList.length === 0) return;
          const available = Math.max(0, MAX_ATTACHMENTS - attachments.length);
          const picked = fileList.slice(0, available);
          if (picked.length === 0) return;
          const compressed = await Promise.all(picked.map((file) => compressImageFile(file)));

          setAttachments((prev) => [
            ...prev,
            ...compressed.map((item, index) => {
              const blob = item.blob;
              return {
                file: new File([blob], picked[index].name, { type: item.mimeType }),
                url: URL.createObjectURL(blob),
                originalSize: item.originalSize,
                compressedSize: item.compressedSize
              };
            })
          ]);
        }

        async function handlePickedFile(event) {
          const files = event.target.files ? Array.from(event.target.files) : [];
          try {
            await pushFiles(files);
          } catch (error) {
            console.error("compress-on-add-failed", error);
          }
          event.target.value = "";
        }

        async function startParse() {
          const text = inputText.trim();
          const quickItems = buildQuickSelectedItems();
          const hasQuick = quickItems.length > 0;
          const hasAiInput = text.length > 0 || attachments.length > 0;
          if (!hasAiInput && !hasQuick) return;

          if (!hasAiInput && hasQuick) {
            applyParsedResults(quickItems);
            setParseError("");
            setPanelMode("result");
            return;
          }

          setIsSending(true);
          setPanelMode("loading");
          setParseError("");

          try {
            const compressed = attachments.map((item) => ({
              blob: item.file,
              mimeType: item.file.type || "image/jpeg",
              originalSize: item.originalSize || item.file.size,
              compressedSize: item.compressedSize || item.file.size
            }));
            const aiObject = await callGeminiParse({
              meal: selectedMeal,
              inputText: text,
              compressedAttachments: compressed
            });
            const normalized = normalizeAiItems(aiObject).map(normalizeEditableFood);
            if (normalized.length === 0 && !hasQuick) {
              const modelReason = String(aiObject?.notes || "").trim() || "模型未返回可用食物条目。";
              applyParsedResults([]);
              setParseError("解析结果不可用：\n" + modelReason);
            } else {
              applyParsedResults([...normalized, ...quickItems]);
              if (normalized.length === 0 && hasQuick) {
                setParseError("AI 未识别到新食物，已保留所选快捷项。");
              } else {
                setParseError("");
              }
            }
            setPanelMode("result");
          } catch (error) {
            console.error("parse-failed", error);
            if (hasQuick) {
              applyParsedResults(quickItems);
              setParseError("AI 解析失败，已保留所选快捷项。");
            } else {
              applyParsedResults([]);
              setParseError("解析失败：\n" + (error?.message || "未知错误"));
            }
            setPanelMode("result");
          } finally {
            setIsSending(false);
          }
        }

        function useLibraryFood(food) {
          applyParsedResults([normalizeEditableFood({
            name: food.name,
            portion: food.portion,
            kcal: food.kcal,
            confidence: food.confidence || 0,
            emoji: food.emoji || "🍽️"
          })]);
          setParseError("");
          setPanelMode("result");
          setLibrarySheetOpen(false);
        }

        function openLibrarySheet() {
          setSingleVisibleCount(20);
          setSelectedLibraryFoods(
            selectedQuickFoods.map(({ key, food }) => ({ key, food }))
          );
          setLibrarySheetOpen(true);
        }

        function toggleQuickFood(food, key) {
          setSelectedQuickFoods((prev) => {
            const exists = prev.some((item) => item.key === key);
            if (exists) return prev.filter((item) => item.key !== key);
            return [...prev, { key, food }];
          });
        }

        function getFoodSelectionKey(food) {
          return `${food?.name || ""}|${food?.portion || ""}`;
        }

        function buildQuickSelectedItems() {
          const fromFoods = selectedQuickFoods.map(({ food }) => normalizeEditableFood({
            name: food.name,
            portion: food.portion,
            kcal: food.kcal,
            confidence: food.confidence || 0,
            emoji: food.emoji || "🍽️"
          }));
          return [...fromFoods];
        }

        function closeLibrarySheet() {
          setLibrarySheetOpen(false);
        }

        function openEntryEdit(entry) {
          setEditingEntry(entry);
          setEditingItem(normalizeEditableFood(entry?.item || {}));
          setEntryServingDraft("");
          setEntryServingEditing(false);
          setEntryNameComposing(false);
          setEntryEditOpen(true);
        }

        function closeEntryEdit() {
          setEntryEditOpen(false);
          setEditingEntry(null);
          setEditingItem(null);
          setEntryServingDraft("");
          setEntryServingEditing(false);
          setEntryNameComposing(false);
        }

        function updateEditingItem(patch) {
          setEditingItem((prev) => normalizeEditableFood({ ...(prev || {}), ...patch }));
        }

        async function saveEditingEntry() {
          if (!editingEntry || !editingItem) return;
          const next = cloneRecords(records);
          const record = next[editingEntry.recordIndex];
          if (!record || !Array.isArray(record.items) || !record.items[editingEntry.itemIndex]) return;
          record.items[editingEntry.itemIndex] = buildStoredItemFromEditable(editingItem);
          try {
            await saveStoredRecords(next);
            closeEntryEdit();
          } catch (error) {
            console.error("save-entry-edit-failed", error);
          }
        }

        async function deleteFromEntryEdit() {
          if (!editingEntry) return;
          closeEntryEdit();
          await handleDeleteSavedItem(editingEntry);
        }

        function onItemRowClick(entry, rowKey) {
          if (swipedItemKey === rowKey) {
            setSwipedItemKey("");
            return;
          }
          openEntryEdit(entry);
        }

        function updateParsedItem(index, patch) {
          setParsedResults((prev) =>
            prev.map((item, i) => {
              if (i !== index) return item;
              return normalizeEditableFood({ ...item, ...patch });
            })
          );
        }

        function toggleLibraryFood(food, key) {
          setSelectedLibraryFoods((prev) => {
            const exists = prev.some((item) => item.key === key);
            if (exists) return prev.filter((item) => item.key !== key);
            return [...prev, { key, food }];
          });
        }

        function applyLibrarySelection() {
          if (selectedLibraryFoods.length === 0) return;
          setSelectedQuickFoods(
            selectedLibraryFoods.map(({ key, food }) => ({ key, food }))
          );
          setPanelMode("input");
          closeLibrarySheet();
        }

        function onLibraryListScroll(event) {
          const element = event.currentTarget;
          const nearBottom = element.scrollTop + element.clientHeight >= element.scrollHeight - 48;
          if (!nearBottom) return;
          setSingleVisibleCount((prev) => Math.min(prev + 20, foodLibrary.foods.length));
        }

        async function saveResults() {
          if (parsedResults.length === 0) {
            return;
          }
          flushParsedEditSession();
          const nextRecords = [
            ...records,
            {
              meal: selectedMeal,
              items: parsedResults.map((item) => ({
                name: item.name,
                portion: `${Number(item.servings) || 1}${item.unitName || "份"}`,
                servings: Number(item.servings) || 1,
                unitKcal: Number(item.unitKcal) || 0,
                unitName: String(item.unitName || "份"),
                kcal: Math.max(0, Math.round((Number(item.servings) || 1) * (Number(item.unitKcal) || 0))),
                confidence: Number(item.confidence) || 0,
                emoji: String(item.emoji || "🍽️")
              })),
              created_at: new Date().toISOString()
            }
          ];

          try {
            await saveStoredRecords(nextRecords);
            setPanelMode("input");
            setInputText("");
            applyParsedResults([]);
            setSelectedQuickFoods([]);
            setParseError("");
          } catch (error) {
            console.error("save-records-failed", error);
          }
        }

        async function bootstrapAuth() {
          const { data } = await supabaseClient.auth.getSession();
          const nextSession = data?.session || null;
          const nextUser = nextSession?.user || null;
          const cacheUserId = nextUser?.id || "guest";
          const cached = readCachedRecords(cacheUserId);
          setRecords(cached.length > 0 ? cached : []);
          setCurrentSession(nextSession);
          setCurrentUser(nextUser);
          setAuthVisible(!nextUser);
          if (nextUser) await initBackendState(nextUser, nextSession);
        }

        useEffect(() => {
          bootstrapAuth();
          const { data } = supabaseClient.auth.onAuthStateChange(async (_event, session) => {
            const nextSession = session || null;
            const nextUser = nextSession?.user || null;
            const cacheUserId = nextUser?.id || "guest";
            const cached = readCachedRecords(cacheUserId);
            setRecords(cached.length > 0 ? cached : []);
            setCurrentSession(nextSession);
            setCurrentUser(nextUser);
            setAuthVisible(!nextUser);
            if (nextUser) {
              await initBackendState(nextUser, nextSession);
            } else {
              if (cached.length === 0) setRecords([]);
            }
          });

          return () => {
            if (pendingDeletionRef.current?.timerId) clearTimeout(pendingDeletionRef.current.timerId);
            cleanupAttachments();
            data?.subscription?.unsubscribe?.();
          };
        }, []);

        useEffect(() => {
          parsedResultsRef.current = cloneParsedItems(parsedResults);
        }, [parsedResults]);

        useEffect(() => {
          if (records.length === 0) {
            setCurrentDateKey(getDateKey(Date.now()));
            return;
          }
          const hasCurrent = records.some((record) => getDateKey(record?.created_at) === currentDateKey);
          if (!hasCurrent) {
            setCurrentDateKey(getDateKey(records[records.length - 1]?.created_at));
          }
        }, [records]);

        function goPrevDate() {
          setCurrentDateKey((prev) => shiftDateKey(prev, -1));
        }

        function goNextDate() {
          const todayKey = getDateKey(Date.now());
          setCurrentDateKey((prev) => {
            const next = shiftDateKey(prev, 1);
            return next > todayKey ? todayKey : next;
          });
        }

        function onSwipeStart(event) {
          if (event.target?.closest && event.target.closest(".item-swipe")) return;
          if (swipedItemKey) setSwipedItemKey("");
          const x = event.touches?.[0]?.clientX;
          if (typeof x === "number") touchStartXRef.current = x;
        }

        function onSwipeEnd(event) {
          if (event.target?.closest && event.target.closest(".item-swipe")) return;
          const startX = touchStartXRef.current;
          const endX = event.changedTouches?.[0]?.clientX;
          touchStartXRef.current = null;
          if (typeof startX !== "number" || typeof endX !== "number") return;
          const delta = endX - startX;
          if (Math.abs(delta) < 42) return;
          if (delta < 0) {
            goPrevDate();
          } else {
            goNextDate();
          }
        }

        async function commitPendingDeletion(target) {
          if (!target) return;
          try {
            await saveStoredRecords(target.nextRecords);
          } catch (error) {
            console.error("delete-record-item-failed", error);
            setRecords(target.prevRecords);
          }
        }

        async function handleDeleteSavedItem(entry) {
          const nextRecords = buildRecordsAfterDelete(records, entry.recordIndex, entry.itemIndex);
          if (!nextRecords) return;
          setSwipedItemKey("");

          if (pendingDeletion) {
            clearTimeout(pendingDeletion.timerId);
            setPendingDeletion(null);
            setUndoToast(null);
            await commitPendingDeletion(pendingDeletion);
          }

          const prevRecords = cloneRecords(records);
          const nextRecordsSnapshot = cloneRecords(nextRecords);
          setRecords(nextRecordsSnapshot);
          const deletionId = "del-" + Date.now();
          const timerId = setTimeout(async () => {
            setPendingDeletion((prev) => (prev?.id === deletionId ? null : prev));
            setUndoToast((prev) => (prev?.id === deletionId ? null : prev));
            await commitPendingDeletion({
              id: deletionId,
              prevRecords,
              nextRecords: nextRecordsSnapshot
            });
          }, 5000);

          setPendingDeletion({
            id: deletionId,
            prevRecords,
            nextRecords: nextRecordsSnapshot,
            timerId
          });
          setUndoToast({
            id: deletionId,
            message: "已删除 1 条食物记录",
            deadline: Date.now() + 5000
          });
        }

        function undoDeletion() {
          if (!pendingDeletion) return;
          clearTimeout(pendingDeletion.timerId);
          setRecords(pendingDeletion.prevRecords);
          setPendingDeletion(null);
          setUndoToast(null);
        }

        function onRowTouchStart(key, event) {
          const touch = event.touches?.[0];
          if (!touch) return;
          rowTouchRef.current = { key, x: touch.clientX, y: touch.clientY };
        }

        function onRowTouchEnd(key, event) {
          const start = rowTouchRef.current;
          rowTouchRef.current = { key: "", x: 0, y: 0 };
          const touch = event.changedTouches?.[0];
          if (!touch || start.key !== key) return;
          const deltaX = touch.clientX - start.x;
          const deltaY = touch.clientY - start.y;
          if (Math.abs(deltaY) > 36) return;
          if (deltaX < -34) {
            setSwipedItemKey(key);
          } else if (deltaX > 24 && swipedItemKey === key) {
            setSwipedItemKey("");
          }
        }

        function onRowPointerDown(key, event) {
          if (event.pointerType === "mouse" && event.button !== 0) return;
          rowPointerRef.current = { key, x: event.clientX, y: event.clientY, moved: false };
        }

        function onRowPointerMove(key, event) {
          const state = rowPointerRef.current;
          if (state.key !== key) return;
          const deltaX = event.clientX - state.x;
          const deltaY = event.clientY - state.y;
          if (!state.moved && Math.abs(deltaX) > 8 && Math.abs(deltaX) > Math.abs(deltaY)) {
            state.moved = true;
            rowPointerRef.current = state;
          }
          if (!state.moved) return;
          if (deltaX < -30) {
            setSwipedItemKey(key);
          } else if (deltaX > 26 && swipedItemKey === key) {
            setSwipedItemKey("");
          }
        }

        function onRowPointerUp() {
          rowPointerRef.current = { key: "", x: 0, y: 0, moved: false };
        }

        async function signUp() {
          const emailText = email.trim();
          if (!emailText || !password) {
            return;
          }
          const { error } = await supabaseClient.auth.signUp({ email: emailText, password });
          if (error) {
            console.error("sign-up-failed", error);
          }
        }

        async function signIn() {
          const emailText = email.trim();
          if (!emailText || !password) {
            return;
          }
          const { data, error } = await supabaseClient.auth.signInWithPassword({ email: emailText, password });
          if (error) {
            console.error("sign-in-failed", error);
            return;
          }
          const nextSession = data?.session || null;
          const nextUser = nextSession?.user || null;
          setCurrentSession(nextSession);
          setCurrentUser(nextUser);
          setAuthVisible(!nextUser);
          await initBackendState(nextUser, nextSession);
        }

        async function signOut() {
          setSettingsMenuOpen(false);
          const { error } = await supabaseClient.auth.signOut();
          if (error) {
            console.error("sign-out-failed", error);
            return;
          }
          setCurrentSession(null);
          setCurrentUser(null);
          setRecords([]);
          setAuthVisible(true);
        }

        return (
          <>
            {undoToast && (
              <div className="undo-toast">
                <span className="toast-action-wrap">
                  <span>{undoToast.message}</span>
                  <button
                    className="toast-action-btn"
                    type="button"
                    onMouseDown={(event) => event.preventDefault()}
                    onClick={undoDeletion}
                  >
                    撤销
                  </button>
                </span>
              </div>
            )}

            {authVisible && (
              <div className="auth-overlay">
                <div className="auth-card">
                  <div className="auth-title">账号登录</div>
                  <div className="auth-note">使用邮箱 + 密码登录。首次使用请先注册。</div>
                  <div className="auth-row">
                    <input className="auth-input" value={email} onChange={(e) => setEmail(e.target.value)} placeholder="you@example.com" />
                  </div>
                  <div className="auth-row">
                    <input className="auth-input" value={password} onChange={(e) => setPassword(e.target.value)} type="password" placeholder="请输入密码" />
                  </div>
                  <div className="auth-row">
                    <button className="auth-btn" type="button" onClick={signUp}>注册</button>
                    <button className="auth-btn" type="button" onClick={signIn}>登录</button>
                  </div>
                </div>
              </div>
            )}

            <main className="page">
              {settingsMenuOpen && <div className="menu-overlay" onClick={() => setSettingsMenuOpen(false)} />}
              {settingsMenuOpen && (
                <div className="settings-menu">
                  <button className="menu-item" type="button" onClick={signOut}>退出登录</button>
                </div>
              )}
              <header className="nav">
                <h1 className="title">我的饮食</h1>
                <button className="nav-settings" type="button" onClick={() => setSettingsMenuOpen((prev) => !prev)} aria-label="设置">
                  <span className="mi" style={{ fontSize: 18 }}>settings</span>
                </button>
              </header>

              <section className="hero">
                <div className="hero-title">总摄入</div>
                <div className="hero-main">
                  <div className="hero-kcal">
                    {selectedDateTotalKcal}
                    <small>千卡</small>
                  </div>
                  <div className="hero-meta">
                    <span className="mi" style={{ fontSize: 14 }}>restaurant</span>
                    {selectedDateRecordCount} 条记录
                  </div>
                </div>
                <div className="hero-goal-row">
                  <div className="hero-goal-text">目标 {goalKcal} 千卡 · 完成 {goalProgressPercent}%</div>
                  {goalEditing ? (
                    <div className="hero-goal-edit">
                      <input
                        className="hero-goal-input"
                        type="tel"
                        inputMode="numeric"
                        pattern="[0-9]*"
                        value={goalDraft}
                        onChange={(e) => setGoalDraft(String(e.target.value || "").replace(/[^\d]/g, ""))}
                        placeholder="目标千卡"
                      />
                      <button className="hero-goal-save" type="button" onClick={saveGoalEdit}>保存</button>
                    </div>
                  ) : (
                    <button className="hero-goal-edit-btn" type="button" onClick={startGoalEdit} aria-label="编辑目标">
                      <span className="mi icon-regular" style={{ fontSize: 14 }}>edit</span>
                    </button>
                  )}
                </div>
                <div className="hero-progress" aria-label="摄入进度">
                  <div className="hero-progress-fill" style={{ width: goalProgressPercent + "%" }} />
                </div>
                <div className="hero-nav">
                  <button className="hero-nav-btn" type="button" onClick={goPrevDate} aria-label="上一天">
                    <span className="mi" style={{ fontSize: 18 }}>chevron_left</span>
                  </button>
                  <div className="hero-date-wrap">
                    <button className="hero-date-btn" type="button">
                      {getDateLabel(currentDateKey)}
                    </button>
                    <input
                      ref={dateInputRef}
                      className="hero-date-native"
                      type="date"
                      value={currentDateKey}
                      max={getDateKey(Date.now())}
                      onChange={(e) => setCurrentDateKey(e.target.value || getDateKey(Date.now()))}
                      aria-label="选择日期"
                    />
                  </div>
                  <button className="hero-nav-btn" type="button" onClick={goNextDate} aria-label="下一天">
                    <span className="mi" style={{ fontSize: 18 }}>chevron_right</span>
                  </button>
                </div>
              </section>

              <section className="content" onTouchStart={onSwipeStart} onTouchEnd={onSwipeEnd}>
                <div className="day-group">
                  {MEALS.map((meal) => {
                    const items = currentDayMeals[meal] || [];
                    if (items.length === 0) return null;
                    const visual = getMealVisual(meal);
                    const total = items.reduce((sum, entry) => sum + (Number(entry?.item?.kcal) || 0), 0);
                    return (
                      <article className="meal" key={currentDateKey + "-" + meal}>
                        <div className="meal-head">
                          <div className="meal-type">
                            <span className={"meal-icon " + visual.cls}>
                              <span className="mi" style={{ fontSize: 14 }}>{visual.icon}</span>
                            </span>
                            <span className="meal-name">{meal}</span>
                          </div>
                          <div className="head-value">
                            <span className="main">{total}</span>
                            <span className="muted">千卡</span>
                          </div>
                        </div>

                        {items.map((entry, idx) => {
                          const item = entry.item || {};
                          const rowKey = currentDateKey + "-" + meal + "-" + idx + "-" + entry.key;
                          const open = swipedItemKey === rowKey;
                          return (
                            <div
                              className={"item-swipe" + (open ? " open" : "")}
                              key={rowKey}
                              onTouchStart={(event) => onRowTouchStart(rowKey, event)}
                              onTouchEnd={(event) => onRowTouchEnd(rowKey, event)}
                              onPointerDown={(event) => onRowPointerDown(rowKey, event)}
                              onPointerMove={(event) => onRowPointerMove(rowKey, event)}
                              onPointerUp={onRowPointerUp}
                              onPointerCancel={onRowPointerUp}
                            >
                              <div className="item-action">
                                <button className="item-delete-btn" type="button" onClick={() => handleDeleteSavedItem(entry)}>删除</button>
                              </div>
                              <div className="item" onClick={() => onItemRowClick(entry, rowKey)}>
                                <span className="food">{((item.emoji && String(item.emoji).trim()) || "🍽️") + " " + (item.name || "未命名食物") + " " + (item.portion || "1份")}</span>
                                <span className="kcal">{Number(item.kcal) || 0} 千卡 <span className="mi" style={{ fontSize: 14 }}>chevron_right</span></span>
                              </div>
                            </div>
                          );
                        })}
                      </article>
                    );
                  })}
                </div>
              </section>

              {records.length === 0 && (
                <div className="empty">
                  <div><span className="mi">nutrition</span></div>
                  还没有饮食记录，点底部按钮添加一条。
                </div>
              )}
            </main>

            <div className="footer">
              <button className="btn" type="button" onClick={() => setSheetOpen(true)}>
                <span className="mi" style={{ fontSize: 22 }}>edit</span>
                添加数据
              </button>
            </div>

            <div className={"sheet-overlay" + (sheetOpen ? " show" : "")} onClick={(e) => { if (e.target === e.currentTarget) closeSheetPanel(); }}>
              <div className="sheet-wrap">
                <div className="sheet-card">
                  <div className="sheet-head">
                    <div className="meal-prefix">记饮食</div>
                    <div className="sheet-head-actions">
                      {panelMode === "result" && (
                        <>
                          <button className="history-btn" type="button" onClick={undoParsedChange} disabled={parsedUndoStack.length === 0}>
                            <span className="mi" style={{ fontSize: 26 }}>undo</span>
                          </button>
                          <button className="history-btn" type="button" onClick={redoParsedChange} disabled={parsedRedoStack.length === 0}>
                            <span className="mi" style={{ fontSize: 26 }}>redo</span>
                          </button>
                        </>
                      )}
                      <button className="close-btn" type="button" onClick={closeSheetPanel}>
                        <span className="mi icon-regular close-icon">close</span>
                      </button>
                    </div>
                  </div>

                  <div className="meal-quick-tabs">
                    {MEALS.map((meal) => (
                      <button
                        key={meal}
                        className={"meal-quick-tab" + (selectedMeal === meal ? " active" : "")}
                        type="button"
                        onClick={() => setSelectedMeal(meal)}
                      >
                        {meal}
                      </button>
                    ))}
                  </div>

                  <div className="media-entry" style={{ display: panelMode === "input" ? "block" : "none" }}>
                    <div style={{ padding: "0 16px" }} className="input-section-title">添加图片</div>
                    <div className={"attach" + (attachments.length === 0 ? " attach-empty" : "") }>
                      {attachments.map((item, index) => (
                        <div className="attach-item has-image" key={item.url}>
                          <img className="attach-thumb" alt="" src={item.url} />
                          <button className="thumb-delete" type="button" onClick={(event) => {
                            event.stopPropagation();
                            URL.revokeObjectURL(item.url);
                            setAttachments((prev) => prev.filter((_, i) => i !== index));
                          }}>
                            <span className="mi" style={{ fontSize: 18 }}>close</span>
                          </button>
                        </div>
                      ))}
                      {attachments.length < MAX_ATTACHMENTS && (
                        <button className={"attach-item" + (attachments.length === 0 ? " attach-option" : "")} type="button" onClick={() => cameraInputRef.current && cameraInputRef.current.click()}>
                          <span className="mi attach-icon">photo_camera</span>
                          {attachments.length === 0 && <span className="attach-label">拍照</span>}
                        </button>
                      )}
                      {attachments.length < MAX_ATTACHMENTS && (
                        <label className={"attach-item" + (attachments.length === 0 ? " attach-option" : "") }>
                          <span className="mi attach-icon">photo_library</span>
                          {attachments.length === 0 && <span className="attach-label">相册</span>}
                          <input ref={galleryInputRef} className="native-file-input" type="file" accept="image/*" multiple onChange={handlePickedFile} />
                        </label>
                      )}
                    </div>
                  </div>

                  <div className="library-entry" style={{ display: panelMode === "input" ? "block" : "none" }}>
                    <button className="library-entry-title" type="button" onClick={openLibrarySheet}>
                      <span>
                        <div className="library-entry-title-main">历史食物</div>
                      </span>
                      <span className="mi" style={{ fontSize: 18, color: "var(--text-muted)" }}>chevron_right</span>
                    </button>
                    <div className="library-entry-quick-row">
                      {foodLibrary.foods.length === 0 ? (
                        <span style={{ color: "var(--text-muted)", fontSize: 12 }}>暂无历史食物</span>
                      ) : (
                        foodLibrary.foods.slice(0, 8).map((food, index) => (
                          <button
                            className={"library-chip" + (selectedQuickFoods.some((item) => item.key === getFoodSelectionKey(food)) ? " selected" : "")}
                            style={{ flexShrink: 0 }}
                            type="button"
                            key={"quick-food-" + food.name + food.portion + index}
                            onClick={() => toggleQuickFood(food, getFoodSelectionKey(food))}
                          >
                            {food.emoji} {food.name}
                          </button>
                        ))
                      )}
                    </div>
                  </div>

                  <div className="text-entry" style={{ display: panelMode === "input" ? "block" : "none" }}>
                    <div className="input-section-title">输入文字</div>
                    <input
                      className="text-entry-input"
                      value={inputText}
                      onChange={(e) => setInputText(e.target.value)}
                      onKeyDown={(e) => {
                        if (e.key === "Enter" && !isSending) startParse();
                      }}
                      type="text"
                      placeholder="例：我今天中午吃了 1 个汉堡"
                    />
                    <button
                      className="send-wide"
                      type="button"
                      onClick={startParse}
                      disabled={isSending}
                    >
                      <span className="mi action-icon">{isSending ? "progress_activity" : "arrow_upward"}</span>
                      <span>发送</span>
                    </button>
                  </div>

                  <div className={"result-panel" + (panelMode === "result" ? " show" : "") }>
                    <div>
                      {parsedResults.map((item, index) => (
                        <div className="result-item" key={index}>
                          <div className="result-cover">{item.emoji}</div>
                          <div className="result-text">
                            <div className="result-item-head">
                              <input
                                className="result-name-input"
                                value={item.name}
                                onFocus={() => beginParsedEditSession("name-" + index)}
                                onCompositionStart={() => setNameComposingIndex(index)}
                                onCompositionEnd={(e) => {
                                  setNameComposingIndex(-1);
                                  updateParsedItem(index, { name: e.target.value.slice(0, 12) });
                                }}
                                onChange={(e) => {
                                  const value = e.target.value;
                                  if (nameComposingIndex === index) {
                                    updateParsedItem(index, { name: value });
                                  } else {
                                    updateParsedItem(index, { name: value.slice(0, 12) });
                                  }
                                }}
                                onBlur={() => endParsedEditSession("name-" + index)}
                              />
                              <button className="result-del" type="button" onClick={() => {
                                const next = parsedResults.filter((_, i) => i !== index);
                                commitParsedChange(next);
                                if (next.length === 0) setPanelMode("input");
                              }}>
                                <span className="mi" style={{ fontSize: 20 }}>delete</span>
                              </button>
                            </div>
                            <div className="result-fields">
                              <label className="result-field-wrap">
                                <span className="result-field-label">份数</span>
                                <div className="serving-unit-row">
                                  <input
                                    className="result-field"
                                    type="tel"
                                    inputMode="decimal"
                                    pattern="[0-9]*[.]?[0-9]*"
                                    value={servingEditIndex === index ? servingDraft : String(item.servings ?? 1)}
                                    onFocus={() => {
                                      beginParsedEditSession("servings-" + index);
                                      setServingEditIndex(index);
                                      setServingDraft("");
                                    }}
                                    onChange={(e) => {
                                      const raw = String(e.target.value || "");
                                      const normalized = raw
                                        .replace(/[^0-9.]/g, "")
                                        .replace(/(\..*)\./g, "$1");
                                      setServingDraft(normalized);
                                      const nextServings = Math.max(0, Number.parseFloat(normalized || "0") || 0);
                                      updateParsedItem(index, { servings: nextServings });
                                    }}
                                    onBlur={() => {
                                      endParsedEditSession("servings-" + index);
                                      setServingEditIndex(-1);
                                      setServingDraft("");
                                    }}
                                    placeholder="份数"
                                  />
                                  <input
                                    className="result-field"
                                    onFocus={() => beginParsedEditSession("unit-" + index)}
                                    value={item.unitName || "份"}
                                    onChange={(e) => updateParsedItem(index, { unitName: (e.target.value || "份").slice(0, 6) })}
                                    onBlur={() => endParsedEditSession("unit-" + index)}
                                    placeholder="单位"
                                  />
                                </div>
                              </label>
                              <label className="result-field-wrap">
                                <span className="result-field-label">千卡</span>
                                <input
                                  className="result-field"
                                  type="tel"
                                  inputMode="numeric"
                                  pattern="[0-9]*"
                                  value={item.kcal ?? 0}
                                  onFocus={() => beginParsedEditSession("kcal-" + index)}
                                  onChange={(e) => {
                                    const onlyDigits = String(e.target.value || "").replace(/[^\d]/g, "");
                                    const nextTotal = Math.max(0, Number.parseInt(onlyDigits || "0", 10) || 0);
                                    const servings = Math.max(0, Number(item.servings) || 0);
                                    const nextUnitKcal = servings > 0 ? nextTotal / servings : nextTotal;
                                    updateParsedItem(index, { unitKcal: nextUnitKcal });
                                  }}
                                  onBlur={() => endParsedEditSession("kcal-" + index)}
                                  placeholder="千卡"
                                />
                              </label>
                            </div>
                          </div>
                        </div>
                      ))}
                    </div>
                    {parseError && <div className="result-error" style={{ display: "block" }}>{parseError}</div>}
                    <div className="result-actions">
                      <button className="result-btn retry" type="button" onClick={() => setPanelMode("input")}>重试</button>
                      <button className="result-btn save" type="button" onClick={saveResults}>
                        <span className="mi action-icon">check</span> 保存记录
                      </button>
                    </div>
                  </div>

                  <div className={"parse-loading" + (panelMode === "loading" ? " show" : "") }>
                    <span className="mi" style={{ fontSize: 18 }}>progress_activity</span>
                    <span>AI 正在解析...</span>
                  </div>

                  <div className="input-row" style={{ display: "none" }} />
                </div>
              </div>
            </div>

            <div className={"library-sheet-overlay" + (librarySheetOpen ? " show" : "")} onClick={(e) => { if (e.target === e.currentTarget) closeLibrarySheet(); }}>
              <div className="library-sheet-wrap">
                <div className="library-sheet-card">
                  <div className="library-sheet-head">
                    <div className="library-sheet-title">历史食物</div>
                    <button className="close-btn" type="button" onClick={closeLibrarySheet}>
                      <span className="mi icon-regular close-icon">close</span>
                    </button>
                  </div>
                  <div className="library-list" onScroll={onLibraryListScroll}>
                    {visibleSingleFoods.length === 0 ? (
                      <span style={{ color: "var(--text-muted)", fontSize: 12 }}>暂无历史食物</span>
                    ) : (
                      visibleSingleFoods.map((food, index) => (
                        <button
                          className={"library-list-item" + (selectedLibraryFoods.some((item) => item.key === getFoodSelectionKey(food)) ? " selected" : "")}
                          type="button"
                          key={food.name + food.portion + index}
                          onClick={() => toggleLibraryFood(food, getFoodSelectionKey(food))}
                        >
                          <div className="library-list-main">
                            <div className="library-list-title">{food.emoji} {food.name}</div>
                            <div className="library-list-meta">{food.portion} · {food.kcal} 千卡</div>
                          </div>
                          <span className="library-list-check">
                            <span className="mi" style={{ fontSize: 12 }}>check</span>
                          </span>
                        </button>
                      ))
                    )}
                  </div>
                  <div className="library-list-footer">
                    <button
                      className="library-add-btn"
                      type="button"
                      onClick={applyLibrarySelection}
                      disabled={selectedLibraryFoods.length === 0}
                    >
                      添加所选
                    </button>
                  </div>
                </div>
              </div>
            </div>

            <div className={"sheet-overlay" + (entryEditOpen ? " show" : "")} onClick={(e) => { if (e.target === e.currentTarget) closeEntryEdit(); }}>
              <div className="sheet-wrap">
                <div className="sheet-card">
                  <div className="sheet-head">
                    <div className="meal-prefix">编辑记录</div>
                    <button className="close-btn" type="button" onClick={closeEntryEdit}>
                      <span className="mi icon-regular close-icon">close</span>
                    </button>
                  </div>
                  {editingItem && (
                    <div className="result-panel show">
                      <div className="result-item" style={{ paddingTop: 8 }}>
                        <div className="result-cover">{editingItem.emoji}</div>
                        <div className="result-text">
                          <div className="result-item-head">
                            <input
                              className="result-name-input"
                              value={editingItem.name}
                              onCompositionStart={() => setEntryNameComposing(true)}
                              onCompositionEnd={(e) => {
                                setEntryNameComposing(false);
                                updateEditingItem({ name: e.target.value.slice(0, 12) });
                              }}
                              onChange={(e) => {
                                const v = e.target.value;
                                updateEditingItem({ name: entryNameComposing ? v : v.slice(0, 12) });
                              }}
                            />
                          </div>
                          <div className="result-fields">
                            <label className="result-field-wrap">
                              <span className="result-field-label">份数</span>
                              <div className="serving-unit-row">
                                <input
                                  className="result-field"
                                  type="tel"
                                  inputMode="decimal"
                                  pattern="[0-9]*[.]?[0-9]*"
                                  value={entryServingEditing ? entryServingDraft : String(editingItem.servings ?? 1)}
                                  onFocus={() => {
                                    setEntryServingEditing(true);
                                    setEntryServingDraft("");
                                  }}
                                  onChange={(e) => {
                                    const raw = String(e.target.value || "");
                                    const normalized = raw.replace(/[^0-9.]/g, "").replace(/(\..*)\./g, "$1");
                                    setEntryServingDraft(normalized);
                                    updateEditingItem({ servings: Math.max(0, Number.parseFloat(normalized || "0") || 0) });
                                  }}
                                  onBlur={() => {
                                    setEntryServingEditing(false);
                                    setEntryServingDraft("");
                                  }}
                                />
                                <input
                                  className="result-field"
                                  value={editingItem.unitName || "份"}
                                  onChange={(e) => updateEditingItem({ unitName: (e.target.value || "份").slice(0, 6) })}
                                />
                              </div>
                            </label>
                            <label className="result-field-wrap">
                              <span className="result-field-label">千卡</span>
                              <input
                                className="result-field"
                                type="tel"
                                inputMode="numeric"
                                pattern="[0-9]*"
                                value={editingItem.kcal ?? 0}
                                onChange={(e) => {
                                  const onlyDigits = String(e.target.value || "").replace(/[^\d]/g, "");
                                  const nextTotal = Math.max(0, Number.parseInt(onlyDigits || "0", 10) || 0);
                                  const servings = Math.max(0, Number(editingItem.servings) || 0);
                                  const nextUnitKcal = servings > 0 ? nextTotal / servings : nextTotal;
                                  updateEditingItem({ unitKcal: nextUnitKcal });
                                }}
                              />
                            </label>
                          </div>
                        </div>
                      </div>
                      <div className="result-actions">
                        <button className="result-btn" type="button" onClick={deleteFromEntryEdit} style={{ width: 88, background: "linear-gradient(160deg, #ff5a56 0%, #ea3f3f 100%)", color: "#fff" }}>
                          删除
                        </button>
                        <button className="result-btn save" type="button" onClick={saveEditingEntry}>
                          <span className="mi action-icon">check</span> 保存
                        </button>
                      </div>
                    </div>
                  )}
                </div>
              </div>
            </div>

            <input ref={cameraInputRef} type="file" accept="image/*" capture="environment" style={{ display: "none" }} onChange={handlePickedFile} />
          </>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
