<!doctype html>
<html lang="zh-CN">
  <script>if(window.matchMedia&&window.matchMedia("(prefers-color-scheme: dark)").matches){document.documentElement.dataset.theme="dark";}</script>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="记饮食" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#eef4ee" />
    <title>我的饮食</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,400,0,0" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,400,1,0" />
    <style>
      :root {
        --bg: #f5f6ef;
        --bg-glow: radial-gradient(circle at 8% 12%, #d7f2d8 0%, rgba(215, 242, 216, 0) 36%),
          radial-gradient(circle at 88% 2%, #ffe7c8 0%, rgba(255, 231, 200, 0) 40%),
          linear-gradient(150deg, #f7f5ea 0%, #eef6ee 42%, #eef4f7 100%);
        --card: rgba(255, 255, 255, 0.92);
        --text-main: #18231f;
        --text-secondary: rgba(24, 35, 31, 0.7);
        --text-muted: rgba(24, 35, 31, 0.5);
        --divider: rgba(15, 31, 24, 0.08);
        --green: #24b37e;
        --green-strong: #1ea772;
        --shadow-soft: 0 12px 32px rgba(31, 67, 49, 0.08);
        --option-size: 14px;
        --option-weight: 400;
        --option-color: var(--text-secondary);
        --nav-safe-height: calc(86px + env(safe-area-inset-top, 0px));
      }

      * { box-sizing: border-box; }
      html { -webkit-text-size-adjust: 100%; }
      * { -webkit-tap-highlight-color: transparent; }
      html, body {
        scrollbar-width: none;
        -ms-overflow-style: none;
      }
      html::-webkit-scrollbar,
      body::-webkit-scrollbar {
        display: none;
        width: 0;
        height: 0;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg-glow);
        color: var(--text-main);
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", "PingFang SC", "Helvetica Neue", Arial, sans-serif;
      }

      button, input, textarea, select {
        font-family: inherit;
      }

      .mi {
        font-family: "Material Symbols Outlined";
        font-weight: 400;
        font-variation-settings: "wght" 400, "FILL" 0, "GRAD" 0, "opsz" 24;
        line-height: 1;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        vertical-align: middle;
      }
      .icon-regular {
        font-weight: 400;
        font-variation-settings: "wght" 400, "FILL" 0, "GRAD" 0, "opsz" 24;
      }
      .action-icon {
        font-size: 21px;
        font-weight: 400;
        font-variation-settings: "wght" 400, "FILL" 0, "GRAD" 0, "opsz" 24;
      }

      .page {
        max-width: 420px;
        margin: 0 auto;
        min-height: 100vh;
        padding-bottom: 138px;
        scrollbar-width: none;
        -ms-overflow-style: none;
      }
      .page::-webkit-scrollbar { display: none; width: 0; height: 0; }

      .hero {
        margin: 6px 12px 0;
        border-radius: 18px;
        padding: 16px;
        background: linear-gradient(140deg, rgba(255, 255, 255, 0.92) 0%, rgba(245, 253, 249, 0.9) 100%);
        border: 1px solid rgba(255, 255, 255, 0.8);
        box-shadow: var(--shadow-soft);
      }

      .hero-title {
        font-size: 13px;
        color: var(--text-muted);
      }

      .hero-main {
        margin-top: 8px;
        display: flex;
        justify-content: space-between;
        align-items: flex-end;
        gap: 12px;
      }

      .hero-kcal {
        font-size: 34px;
        line-height: 1;
        letter-spacing: -0.6px;
        font-weight: 700;
        display: inline-flex;
        align-items: baseline;
        gap: 4px;
        font-variant-numeric: tabular-nums;
      }

      .hero-kcal small {
        font-size: 14px;
        color: var(--text-muted);
        font-weight: 500;
        line-height: 1;
      }

      .hero-meta {
        font-size: 12px;
        color: var(--text-secondary);
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 6px 10px;
        border-radius: 999px;
        background: rgba(36, 179, 126, 0.1);
      }
      .hero-goal-row {
        margin-top: 10px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }
      .hero-goal-text {
        font-size: 12px;
        color: var(--text-secondary);
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }
      .hero-goal-edit-btn {
        width: 22px;
        height: 22px;
        border: 0;
        border-radius: 999px;
        background: rgba(24, 35, 31, 0.08);
        color: var(--text-secondary);
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }
      .hero-goal-input {
        width: 100%;
        height: 44px;
        border: 1px solid rgba(0, 0, 0, 0.12);
        border-radius: 10px;
        padding: 0 12px;
        font-size: 16px;
      }
      .hero-goal-save {
        height: 44px;
        border: 0;
        border-radius: 999px;
        padding: 0 16px;
        font-size: 14px;
        color: #fff;
        background: linear-gradient(130deg, var(--green) 0%, var(--green-strong) 100%);
      }
      .goal-sheet-body {
        padding: 6px 16px 18px;
        display: grid;
        gap: 10px;
      }
      .goal-sheet-note {
        font-size: 12px;
        color: var(--text-muted);
      }
      .goal-sheet-actions {
        display: flex;
        gap: 8px;
      }
      .hero-progress {
        margin-top: 8px;
        height: 8px;
        border-radius: 999px;
        background: rgba(24, 35, 31, 0.1);
        overflow: hidden;
      }
      .hero-progress-fill {
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(130deg, var(--green) 0%, var(--green-strong) 100%);
        transition: width 0.24s ease;
      }

      .hero-nav {
        margin-top: 12px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
      }

      .hero-nav-btn {
        width: 34px;
        height: 34px;
        border: 0;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.9);
        color: var(--text-main);
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }

      .hero-date-btn {
        width: 100%;
        border: 0;
        height: 34px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.92);
        color: var(--text-secondary);
        font-size: 13px;
        font-weight: 600;
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "PingFang SC", "Helvetica Neue", Arial, sans-serif;
      }

      .hero-date-wrap {
        position: relative;
        flex: 1;
        min-width: 0;
      }

      .hero-date-native {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        opacity: 0;
        border: 0;
        background: transparent;
      }

      .nav {
        height: var(--nav-safe-height);
        display: flex;
        align-items: flex-end;
        justify-content: center;
        padding: env(safe-area-inset-top, 0px) 16px 14px;
        position: sticky;
        top: 0;
        z-index: 3;
        background: transparent;
        isolation: isolate;
      }

      .nav::before {
        content: "";
        position: absolute;
        left: 0;
        right: 0;
        top: calc(-1 * env(safe-area-inset-top, 0px));
        bottom: 0;
        pointer-events: none;
        background: rgba(255, 255, 255, 0.01);
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
        z-index: -1;
      }

      .title {
        margin: 0;
        font-size: 18px;
        line-height: 1;
        font-weight: 800;
        letter-spacing: 0.2px;
      }

      .nav-settings {
        position: absolute;
        right: 14px;
        bottom: 8px;
        width: 34px;
        height: 34px;
        border: 0;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.86);
        box-shadow: var(--shadow-soft);
        color: rgba(24, 35, 31, 0.76);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: transform 0.18s ease;
      }

      .nav-settings:active { transform: scale(0.94); }

      .menu-overlay {
        position: fixed;
        inset: 0;
        z-index: 25;
      }

      .settings-menu {
        position: fixed;
        right: calc((100vw - min(420px, 100vw)) / 2 + 14px);
        top: 68px;
        width: 168px;
        background: rgba(255, 255, 255, 0.98);
        border: 1px solid rgba(0, 0, 0, 0.08);
        border-radius: 12px;
        box-shadow: 0 18px 34px rgba(15, 27, 21, 0.14);
        padding: 6px;
        z-index: 26;
      }

      .menu-item {
        width: 100%;
        height: 38px;
        border: 0;
        border-radius: 8px;
        background: transparent;
        text-align: left;
        padding: 0 10px;
        color: var(--text-main);
        font-size: 13px;
      }

      .menu-item:active {
        background: rgba(0, 0, 0, 0.05);
      }

      .content {
        padding: 8px 12px 0;
        display: flex;
        flex-direction: column;
        gap: 10px;
        scrollbar-width: none;
        -ms-overflow-style: none;
      }
      .content::-webkit-scrollbar { display: none; width: 0; height: 0; }

      .day-group {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .day-title {
        margin: 6px 2px 0;
        font-size: 13px;
        font-weight: 600;
        color: var(--text-secondary);
      }

      .meal {
        background: var(--card);
        border-radius: 16px;
        overflow: hidden;
        box-shadow: var(--shadow-soft);
        border: 1px solid rgba(255, 255, 255, 0.75);
        animation: fadeInUp 0.35s ease both;
        transition: transform 0.22s ease, box-shadow 0.22s ease;
      }

      .meal:hover {
        transform: translateY(-2px);
        box-shadow: 0 16px 34px rgba(31, 67, 49, 0.12);
      }

      .meal-head {
        padding: 15px 15px 14px;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .meal-type { display: flex; align-items: center; gap: 12px; }

      .meal-icon {
        width: 26px;
        height: 26px;
        border-radius: 999px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        color: #fff;
      }
      .meal-icon .mi {
        font-family: "Material Symbols Rounded" !important;
        font-variation-settings: "wght" 400, "FILL" 1, "GRAD" 0, "opsz" 24 !important;
      }

      .breakfast { background: linear-gradient(140deg, #f0a240 0%, #ed8957 100%); }
      .lunch { background: linear-gradient(140deg, #e98563 0%, #d26d4e 100%); }
      .dinner { background: linear-gradient(140deg, #5a77ea 0%, #4963d4 100%); }

      .meal-name { font-size: 16px; font-weight: 600; }
      .head-value {
        display: inline-flex;
        align-items: baseline;
        justify-content: flex-end;
        gap: 4px;
        font-size: 14px;
        font-variant-numeric: tabular-nums;
      }
      .head-value .main {
        color: var(--text-main);
        font-weight: 600;
        line-height: 1;
      }
      .head-value .muted {
        color: var(--text-muted);
        line-height: 1;
      }

      .item {
        padding: 14px 15px;
        min-height: 58px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 22px;
        transition: background 0.16s ease;
        background: rgba(255, 255, 255, 0.96);
        transform: translateX(0);
        transition: transform 0.2s ease, background 0.16s ease;
        position: relative;
        z-index: 2;
      }

      .item:active { background: rgba(36, 179, 126, 0.05); }

      .item-swipe {
        position: relative;
        overflow: hidden;
        border-top: 1px solid var(--divider);
        touch-action: pan-y;
      }

      .item-swipe.open .item {
        transform: translateX(-78px);
      }

      .item-action {
        position: absolute;
        right: 0;
        top: 0;
        bottom: 0;
        width: 78px;
        display: flex;
        align-items: stretch;
        justify-content: stretch;
        z-index: 3;
        transform: translateX(100%);
        transition: transform 0.2s ease;
        pointer-events: none;
      }

      .item-swipe.open .item-action {
        transform: translateX(0);
        pointer-events: auto;
      }

      .item-delete-btn {
        width: 100%;
        border: 0;
        color: #fff;
        font-size: 13px;
        font-weight: 600;
        background: linear-gradient(160deg, #ff5a56 0%, #ea3f3f 100%);
      }

      .food {
        flex: 1;
        min-width: 0;
        color: var(--text-secondary);
        font-size: 14px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .kcal {
        flex-shrink: 0;
        color: var(--text-muted);
        font-size: 12px;
        display: flex;
        align-items: center;
        gap: 2px;
      }

      .empty {
        margin: 38px 12px 0;
        padding: 24px 18px;
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.76);
        border: 1px dashed rgba(24, 35, 31, 0.14);
        text-align: center;
        color: var(--text-muted);
      }

      .empty .mi {
        font-size: 26px;
        margin-bottom: 8px;
        color: rgba(36, 179, 126, 0.82);
      }

      .footer {
        position: fixed;
        left: 50%;
        transform: translateX(-50%);
        bottom: 0;
        width: min(420px, 100vw);
        background: transparent;
        padding: 18px 20px calc(40px + env(safe-area-inset-bottom, 0px));
        z-index: 4;
        isolation: isolate;
      }

      .footer::before {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
        background: rgba(255, 255, 255, 0.01);
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
        z-index: -1;
      }

      .btn {
        width: 100%;
        height: 52px;
        border: 0;
        border-radius: 999px;
        background: linear-gradient(130deg, var(--green) 0%, var(--green-strong) 100%);
        color: #fff;
        font-size: 14px;
        font-weight: 700;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        box-shadow: 0 14px 30px rgba(36, 179, 126, 0.32);
        cursor: pointer;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
      }

      .btn:active {
        transform: translateY(1px) scale(0.99);
        box-shadow: 0 10px 20px rgba(36, 179, 126, 0.24);
      }

      .sheet-overlay {
        position: fixed;
        inset: 0;
        background: rgba(12, 20, 16, 0.26);
        display: flex;
        justify-content: center;
        align-items: flex-end;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.22s ease;
        z-index: 20;
        backdrop-filter: blur(2px);
      }

      .sheet-overlay.show { opacity: 1; pointer-events: auto; }
      .sheet-wrap {
        width: min(420px, 100vw);
        max-height: calc(100dvh - var(--nav-safe-height));
        transform: translateY(24px);
        transition: transform 0.24s cubic-bezier(0.22, 0.9, 0.34, 1);
      }
      .sheet-overlay.show .sheet-wrap { transform: translateY(0); }

      .sheet-card {
        background: linear-gradient(180deg, #ffffff 0%, #fbfffd 100%);
        border-radius: 20px 20px 0 0;
        overflow: visible;
        box-shadow: 0 -20px 38px rgba(20, 42, 31, 0.14);
        padding-bottom: env(safe-area-inset-bottom, 0);
        transform-origin: bottom center;
        max-height: calc(100dvh - var(--nav-safe-height));
      }
      .sheet-content-viewport {
        overflow: hidden;
      }
      .sheet-content-viewport.fluid {
        transition: height 0.24s cubic-bezier(0.22, 0.9, 0.34, 1);
      }
      .sheet-flow-view {
        animation: fadeUp 0.2s ease;
      }

      .sheet-head {
        padding: 18px 16px;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .sheet-head-actions {
        display: inline-flex;
        align-items: center;
        gap: 12px;
      }
      .history-btn {
        width: 34px;
        height: 34px;
        border: 0;
        border-radius: 0;
        background: transparent;
        color: rgba(0, 0, 0, 0.62);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0;
        transition: transform 0.16s ease, color 0.16s ease, opacity 0.16s ease;
      }
      .history-btn:not(:disabled):active { transform: scale(0.92); }
      .history-btn:disabled {
        opacity: 0.36;
      }

      .meal-prefix { font-size: 16px; font-weight: 600; }

      .close-btn {
        width: 30px;
        height: 30px;
        border: 0;
        border-radius: 999px;
        background: rgba(0, 0, 0, 0.04);
        color: rgba(0, 0, 0, 0.52);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0;
        transition: transform 0.16s ease, background-color 0.16s ease;
      }
      .close-icon {
        font-size: 22px;
      }
      .close-btn:active {
        transform: scale(0.94);
        background: rgba(0, 0, 0, 0.08);
      }

      .attach {
        padding: 10px 16px 16px;
        display: flex;
        gap: 10px;
        overflow-x: auto;
        scrollbar-width: none;
      }
      .attach::-webkit-scrollbar { display: none; }
      .attach.attach-empty { overflow-x: visible; }

      .input-section-title {
        font-size: 15px;
        font-weight: 700;
        color: var(--text-main);
      }

      .media-entry {
        padding: 12px 0 0;
      }

      .library-entry {
        padding: 12px 16px 14px;
      }

      .library-entry-title {
        width: 100%;
        border: 0;
        background: transparent;
        padding: 0;
        display: flex;
        align-items: center;
        justify-content: space-between;
        color: var(--text-main);
        text-align: left;
      }

      .library-entry-title-main {
        font-size: 15px;
        font-weight: 700;
      }

      .library-entry-quick-row::-webkit-scrollbar { display: none; }
      .library-entry-quick-row {
        margin-top: 8px;
        margin-left: -16px;
        margin-right: -16px;
        display: flex;
        gap: 8px;
        overflow-x: auto;
        scrollbar-width: none;
        padding: 2px 16px;
        scroll-padding-left: 16px;
        scroll-padding-right: 16px;
        scroll-snap-type: x proximity;
      }

      .library-sheet-overlay {
        position: fixed;
        inset: 0;
        background: rgba(12, 20, 16, 0.26);
        display: flex;
        justify-content: center;
        align-items: flex-end;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.2s ease;
        z-index: 32;
        backdrop-filter: blur(2px);
      }

      .library-sheet-overlay.show {
        opacity: 1;
        pointer-events: auto;
      }

      .library-sheet-wrap {
        width: min(420px, 100vw);
        max-height: calc(100dvh - var(--nav-safe-height));
        transform: translateY(20px);
        transition: transform 0.22s cubic-bezier(0.22, 0.9, 0.34, 1);
      }

      .library-sheet-overlay.show .library-sheet-wrap {
        transform: translateY(0);
      }

      .library-sheet-card {
        background: #fff;
        border-radius: 20px 20px 0 0;
        height: 520px;
        max-height: calc(100dvh - var(--nav-safe-height));
        padding-bottom: env(safe-area-inset-bottom, 0);
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }

      .meal-quick-tabs {
        padding: 0 16px 10px;
        display: flex;
        gap: 8px;
      }

      .result-panel.show {
        padding-top: 4px;
      }

      .meal-quick-tab {
        flex: 1;
        min-width: 0;
        height: 48px;
        border: 1px solid rgba(0, 0, 0, 0.09);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.92);
        padding: 0 10px;
        font-size: var(--option-size);
        font-weight: var(--option-weight);
        color: var(--option-color);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        transition: transform 0.16s ease, background-color 0.2s ease, border-color 0.2s ease, color 0.2s ease;
      }
      .meal-quick-tab:active { transform: scale(0.98); }
      .meal-quick-tab .meal-tab-icon {
        font-size: calc(var(--option-size) * 1.5);
        font-weight: 400;
        font-variation-settings: "wght" 400, "FILL" 0, "GRAD" 0, "opsz" 24;
        color: currentColor;
        line-height: 1;
      }

      .meal-quick-tab.active {
        border-color: var(--green);
        background: rgba(36, 179, 126, 0.15);
        color: #0f4f37;
      }

      .library-list {
        flex: 1;
        overflow-y: auto;
        padding: 12px 16px 14px;
        display: grid;
        gap: 8px;
        scrollbar-width: none;
      }

      .library-list::-webkit-scrollbar { display: none; }

      .library-list-item {
        width: 100%;
        border: 1px solid rgba(0, 0, 0, 0.08);
        background: rgba(255, 255, 255, 0.95);
        border-radius: 10px;
        min-height: 54px;
        padding: 10px 12px;
        text-align: left;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        transition: transform 0.16s ease, background-color 0.2s ease, border-color 0.2s ease;
      }
      .library-list-item:active { transform: scale(0.985); }

      .library-list-item.selected {
        border-color: var(--green);
        background: rgba(36, 179, 126, 0.14);
      }

      .library-list-main {
        min-width: 0;
        flex: 1;
      }

      .library-list-title {
        font-size: 13px;
        color: var(--text-main);
        font-weight: 600;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .library-list-meta {
        margin-top: 3px;
        font-size: 11px;
        color: var(--text-muted);
      }

      .library-list-check {
        width: 18px;
        height: 18px;
        border-radius: 999px;
        border: 1px solid rgba(0, 0, 0, 0.2);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        color: #fff;
        background: transparent;
      }

      .library-list-item.selected .library-list-check {
        border-color: var(--green-strong);

      }

      .library-list-footer {
        border-top: 1px solid var(--divider);
        padding: 10px 16px;
      }

      .library-add-btn {
        width: 100%;
        height: 48px;
        border: 0;
        border-radius: 999px;
        color: #fff;
        background: linear-gradient(130deg, var(--green) 0%, var(--green-strong) 100%);
        font-size: 13px;
        font-weight: 600;
        transition: transform 0.16s ease, box-shadow 0.2s ease, opacity 0.2s ease;
        box-shadow: 0 10px 20px rgba(36, 179, 126, 0.22);
      }
      .library-add-btn:active { transform: scale(0.985); }

      .library-add-btn:disabled {
        opacity: 0.5;
      }

      .library-chip {
        border: 1px solid rgba(0, 0, 0, 0.1);
        background: rgba(255, 255, 255, 0.92);
        border-radius: 8px;
        min-height: 40px;
        padding: 0 14px;
        font-size: var(--option-size);
        font-weight: var(--option-weight);
        color: var(--option-color);
        white-space: nowrap;
        transition: transform 0.16s ease, background-color 0.2s ease, border-color 0.2s ease, color 0.2s ease;
        scroll-snap-align: start;
      }
      .library-chip:active { transform: scale(0.97); }

      .library-chip.selected {
        border-color: var(--green);
        background: rgba(36, 179, 126, 0.15);
        color: #0f4f37;
      }


      .attach-item {
        width: 66px;
        height: 66px;
        border: 1px solid rgba(0, 0, 0, 0.09);
        border-radius: 8px;
        background: transparent;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        color: var(--text-muted);
        font-size: 14px;
        flex-shrink: 0;
        position: relative;
        overflow: visible;
        transition: transform 0.16s ease, border-color 0.2s ease, background-color 0.2s ease;
      }
      .attach-item:active { transform: scale(0.98); }

      .attach-item.has-image {
        border: 0;
      }
      .attach-item.has-image::after {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: inherit;
        box-shadow: inset 0 0 0 1.5px rgba(0, 0, 0, 0.18);
        pointer-events: none;
        z-index: 1;
      }

      .attach-option { flex: 1 0 0; min-width: 0; padding: 0 16px; }
      .attach-label { font-size: var(--option-size); font-weight: var(--option-weight); color: var(--option-color); }
      .attach-icon {
        font-size: calc(var(--option-size) * 1.5);
        font-weight: 400;
        font-variation-settings: "wght" 400, "FILL" 0, "GRAD" 0, "opsz" 24;
        color: var(--option-color);
        line-height: 1;
      }
      .attach-thumb {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        border-radius: inherit;
        cursor: zoom-in;
      }

      .thumb-delete {
        position: absolute;
        right: -10px;
        top: -10px;
        width: 20px;
        height: 20px;
        border: 0;
        border-radius: 999px;
        background: rgba(0, 0, 0, 0.58);
        color: #fff;
        z-index: 2;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0;
        line-height: 1;
      }
      .thumb-delete .mi { font-size: 14px !important; }

      .image-preview-overlay {
        position: fixed;
        inset: 0;
        z-index: 85;
        background: rgba(8, 10, 9, 0.92);
        display: flex;
        justify-content: center;
        align-items: center;
        padding: max(env(safe-area-inset-top, 0px), 12px) 14px max(env(safe-area-inset-bottom, 0px), 14px);
      }
      .image-preview-stage {
        position: relative;
        width: min(420px, 100%);
        height: min(82vh, 680px);
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .image-preview-img {
        max-width: 100%;
        max-height: 100%;
        object-fit: contain;
        border-radius: 12px;
      }
      .image-preview-close {
        position: absolute;
        top: 6px;
        right: 6px;
        width: 32px;
        height: 32px;
        border: 0;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.16);
        color: #fff;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }
      .image-preview-nav {
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        width: 34px;
        height: 34px;
        border: 0;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.16);
        color: #fff;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }
      .image-preview-nav.prev { left: 6px; }
      .image-preview-nav.next { right: 6px; }
      .image-preview-meta {
        position: absolute;
        bottom: 6px;
        left: 50%;
        transform: translateX(-50%);
        color: rgba(255, 255, 255, 0.88);
        font-size: 12px;
      }

      .native-file-input {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        opacity: 0;
      }

      .input-row {
        display: flex;
        align-items: center;
        padding: 0 12px 0 16px;
        min-height: 56px;
      }

      .text-entry {
        padding: 12px 16px 14px;
      }

      .text-entry-input {
        margin-top: 10px;
        width: 100%;
        min-height: 46px;
        border: 1px solid rgba(0, 0, 0, 0.1);
        border-radius: 10px;
        padding: 10px 12px;
        font-size: 16px;
        color: var(--text-main);
        background: rgba(255, 255, 255, 0.96);
      }

      .send-wide {
        margin-top: 20px;
        width: 100%;
        height: 48px;
        border: 0;
        border-radius: 999px;
        background: linear-gradient(130deg, var(--green) 0%, var(--green-strong) 100%);
        color: #fff;
        font-size: 14px;
        font-weight: 600;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        transition: transform 0.16s ease, box-shadow 0.2s ease, opacity 0.2s ease;
        box-shadow: 0 10px 22px rgba(36, 179, 126, 0.24);
      }
      .send-wide:active { transform: scale(0.985); }

      .send-wide:disabled {
        opacity: 0.5;
      }

      .prompt-input {
        flex: 1;
        height: 46px;
        border: 0;
        outline: none;
        background: transparent;
        font-size: 16px;
        color: var(--text-main);
      }
      .prompt-input::placeholder { color: var(--text-muted); }

      .send {
        width: 37px;
        height: 37px;
        border: 0;
        border-radius: 999px;
        margin-bottom: 0;
        background: linear-gradient(130deg, var(--green) 0%, var(--green-strong) 100%);
        color: #fff;
        box-shadow: 0 8px 16px rgba(36, 179, 126, 0.28);
      }
      .send:disabled { opacity: 0.62; }

      .send.loading .mi {
        animation: spin 0.9s linear infinite;
      }

      .parse-loading {
        padding: 16px;
        display: none;
        align-items: center;
        gap: 8px;
        color: var(--text-muted);
      }
      .parse-loading.show { display: flex; }

      .result-panel { display: none; }
      .result-panel.show { display: block; padding-top: 8px; }
      .result-items-list {
        display: grid;
        gap: 10px;
      }

      .result-item {
        padding: 0 16px 15px;
        display: grid;
        grid-template-columns: 50px minmax(0, 1fr);
        align-items: start;
        gap: 14px;
        animation: fadeInUp 0.25s ease both;
      }

      .result-cover {
        width: 50px;
        height: 50px;
        border: 0;
        border-radius: 8px;
        background: rgba(36, 179, 126, 0.1);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 24px;
        transition: transform 0.16s ease, background-color 0.2s ease;
      }
      .result-cover:active { transform: scale(0.96); }

      .result-text { min-width: 0; display: grid; gap: 8px; }
      .result-item-head {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .result-name-input {
        flex: 1;
        min-width: 0;
        border: 1px solid rgba(0,0,0,.1);
        border-radius: 10px;
        padding: 8px 10px;
        font-size: 16px;
        color: var(--text-main);
      }
      .result-fields {
        display: grid;
        grid-template-columns: 1.3fr 1fr;
        gap: 8px;
      }
      .result-field-wrap {
        display: grid;
        gap: 4px;
      }
      .serving-unit-row {
        display: grid;
        grid-template-columns: 1fr 74px;
        gap: 8px;
      }
      .result-field-label {
        font-size: 11px;
        color: var(--text-muted);
        line-height: 1;
      }
      .result-field {
        border: 1px solid rgba(0,0,0,.1);
        border-radius: 10px;
        padding: 8px 10px;
        font-size: 16px;
        color: var(--text-main);
        width: 100%;
        min-width: 0;
      }
      .result-del {
        width: 40px;
        height: 40px;
        flex-shrink: 0;
        border: 0;
        border-radius: 999px;
        background: rgba(0, 0, 0, 0.03);
        color: rgba(0, 0, 0, 0.74);
      }

      @media (max-width: 390px) {
        .result-fields {
          grid-template-columns: 1fr;
        }
      }

      .result-actions {
        padding: 16px;
        display: flex;
        flex-wrap: nowrap;
        align-items: center;
        gap: 8px;
      }

      .result-error { padding: 0 16px 16px; color: #cb2f31; font-size: 13px; white-space: pre-wrap; }
      /* ── AI 加载：脉冲雷达 ── */
      .parse-status {
        margin: 2px 16px 0;
        border-radius: 22px;
        padding: 32px 16px 28px;
        background: linear-gradient(160deg, rgba(36,179,126,0.07) 0%, rgba(30,167,114,0.03) 100%);
        border: 1px solid rgba(36,179,126,0.16);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
        position: relative;
        overflow: hidden;
      }
      .ai-sonar {
        position: relative;
        width: 72px;
        height: 72px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }
      .ai-sonar-ring {
        position: absolute;
        border-radius: 50%;
        width: 22px;
        height: 22px;
        border: 1.5px solid rgba(36,179,126,0.75);
        animation: sonarExpand 2.1s ease-out infinite;
      }
      .ai-sonar-ring:nth-child(2) { animation-delay: 0.7s; }
      .ai-sonar-ring:nth-child(3) { animation-delay: 1.4s; }
      @keyframes sonarExpand {
        0%   { transform: scale(0.5); opacity: 0.9; }
        100% { transform: scale(3.3); opacity: 0; }
      }
      .ai-sonar-core {
        width: 18px;
        height: 18px;
        border-radius: 50%;
        background: radial-gradient(circle at 38% 32%, #5de8b0, #1ea772);
        box-shadow: 0 0 0 4px rgba(36,179,126,0.14), 0 0 18px rgba(36,179,126,0.55);
        animation: sonarCoreGlow 2.1s ease-in-out infinite;
        z-index: 1;
      }
      @keyframes sonarCoreGlow {
        0%, 100% { box-shadow: 0 0 0 4px rgba(36,179,126,0.14), 0 0 14px rgba(36,179,126,0.45); }
        50%       { box-shadow: 0 0 0 6px rgba(36,179,126,0.22), 0 0 26px rgba(36,179,126,0.75); }
      }
      .ai-status-text {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 5px;
        text-align: center;
      }
      .ai-status-label {
        font-size: 14px;
        font-weight: 600;
        color: var(--text-main);
        letter-spacing: 0.1px;
      }
      .ai-status-phase {
        font-size: 11px;
        font-weight: 500;
        color: var(--green);
        letter-spacing: 0.8px;
        text-transform: uppercase;
        opacity: 0.75;
      }
      .ai-scan-line {
        position: absolute;
        bottom: 0; left: 0; right: 0;
        height: 2px;
        background: linear-gradient(90deg, transparent 0%, rgba(36,179,126,0.5) 40%, rgba(36,179,126,1) 50%, rgba(36,179,126,0.5) 60%, transparent 100%);
        background-size: 55% 100%;
        background-repeat: no-repeat;
        animation: aiScanMove 2s linear infinite;
      }
      @keyframes aiScanMove {
        0%   { background-position: -55% 0; }
        100% { background-position: 155% 0; }
      }
      .result-skeleton {
        padding: 12px 16px 16px;
        display: grid;
        gap: 10px;
      }
      .result-skeleton-row {
        height: 72px;
        border-radius: 14px;
        background: rgba(36,179,126,0.05);
        border: 1px solid rgba(36,179,126,0.08);
        position: relative;
        overflow: hidden;
      }
      .result-skeleton-row::after {
        content: '';
        position: absolute;
        inset: 0;
        background: linear-gradient(105deg, transparent 30%, rgba(255,255,255,0.55) 50%, transparent 70%);
        animation: skeletonShine 1.8s ease-in-out infinite;
      }
      .result-skeleton-row:nth-child(2)::after { animation-delay: 0.24s; }
      .result-skeleton-row:nth-child(3)::after { animation-delay: 0.48s; }
      @keyframes skeletonShine {
        0%   { transform: translateX(-130%); }
        100% { transform: translateX(230%); }
      }
      /* keep parse-status .mi for non-loading states */
      .parse-status .mi { font-size: 16px; }
      .parse-status.loading .mi { animation: spin 0.9s linear infinite; }
      .result-skeleton-row-placeholder {
        height: 72px;
        border-radius: 12px;
        background: rgba(0,0,0,.04);
        animation: shimmer 1.4s ease-in-out infinite;
      }
      .task-entry {
        margin: 0 12px 10px;
        border-radius: 999px;
        padding: 8px 12px;
        background: rgba(12, 20, 16, 0.86);
        color: #fff;
        font-size: 12px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
      }
      .task-entry-btn {
        border: 0;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.16);
        color: #fff;
        padding: 4px 10px;
        font-size: 12px;
      }

      .result-btn {
        height: 48px;
        border: 0;
        border-radius: 999px;
        font-size: 14px;
        font-weight: 600;
        transition: transform 0.16s ease, opacity 0.2s ease;
      }
      .result-btn:active { transform: scale(0.985); }
      .result-btn.retry { width: 88px; flex: 0 0 88px; background: rgba(0, 0, 0, 0.04); color: var(--text-secondary); }
      .result-btn.save { flex: 1 1 auto; min-width: 0; color: #fff; background: linear-gradient(130deg, var(--green) 0%, var(--green-strong) 100%); }

      .auth-overlay {
        position: fixed;
        inset: 0;
        background: rgba(7, 16, 12, 0.34);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 40;
        padding: 16px;
      }

      .auth-card {
        width: min(420px, 100%);
        background: rgba(255, 255, 255, 0.98);
        border-radius: 16px;
        padding: 18px;
        box-shadow: 0 24px 56px rgba(18, 42, 30, 0.2);
      }

      .auth-title { font-size: 20px; font-weight: 700; }
      .auth-note { margin-top: 6px; color: var(--text-muted); font-size: 12px; }

      .auth-row { margin-top: 12px; display: flex; gap: 8px; }
      .auth-input {
        flex: 1;
        height: 42px;
        border: 1px solid rgba(0, 0, 0, 0.13);
        border-radius: 10px;
        padding: 0 12px;
        font-size: 14px;
      }
      .auth-btn {
        height: 40px;
        border: 0;
        border-radius: 10px;
        padding: 0 12px;
        background: linear-gradient(130deg, var(--green) 0%, var(--green-strong) 100%);
        color: #fff;
        font-size: 13px;
      }

      .toast-action-wrap {
        display: inline-flex;
        align-items: center;
        gap: 10px;
      }

      .toast-action-btn {
        border: 0;
        background: rgba(255, 255, 255, 0.18);
        color: #fff;
        border-radius: 999px;
        padding: 4px 10px;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
        pointer-events: auto;
        position: relative;
        z-index: 2;
      }

      .undo-toast {
        position: fixed;
        left: 50%;
        bottom: 108px;
        transform: translateX(-50%);
        max-width: min(360px, calc(100vw - 24px));
        background: rgba(8, 14, 11, 0.9);
        color: #fff;
        border-radius: 12px;
        padding: 10px 12px;
        font-size: 12px;
        line-height: 1.35;
        z-index: 9999;
        pointer-events: auto;
        isolation: isolate;
      }

      @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(8px); }
        to { opacity: 1; transform: translateY(0); }
      }

      @keyframes spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
      @keyframes shimmer {
        from { background-position: 100% 0; }
        to { background-position: -120% 0; }
      }
      @keyframes parseFlow {
        from { background-position: 100% 0; transform: translateX(-8%); }
        to { background-position: -100% 0; transform: translateX(180%); }
      }

      @media (prefers-reduced-motion: reduce) {
        * { animation: none !important; transition: none !important; }
      }

      @media (max-width: 420px) {
        .page { max-width: 100vw; }
      }

      /* ── Dark mode ── */
      [data-theme="dark"] {
        --bg: #111c16;
        --bg-glow: radial-gradient(circle at 8% 12%, rgba(36,179,126,0.13) 0%, transparent 36%),
          radial-gradient(circle at 88% 2%, rgba(255,140,60,0.08) 0%, transparent 40%),
          linear-gradient(150deg, #141e16 0%, #121f19 42%, #11181f 100%);
        --card: rgba(255, 255, 255, 0.07);
        --text-main: #dff0e8;
        --text-secondary: rgba(223, 240, 232, 0.70);
        --text-muted: rgba(223, 240, 232, 0.45);
        --divider: rgba(223, 240, 232, 0.10);
        --green: #2ec98f;
        --green-strong: #27b87e;
        --shadow-soft: 0 12px 32px rgba(0,0,0,0.40);
      }

      [data-theme="dark"] .hero {
        background: linear-gradient(140deg, rgba(255,255,255,0.09) 0%, rgba(255,255,255,0.06) 100%);
        border-color: rgba(255,255,255,0.10);

      [data-theme="dark"] .meal {
        border-color: rgba(255,255,255,0.10);
      }
      [data-theme="dark"] .hero-goal-input {
        background: rgba(255,255,255,0.07);
        border-color: rgba(255,255,255,0.14);
        color: var(--text-main);
      }
      [data-theme="dark"] .hero-goal-edit-btn {
        background: rgba(255,255,255,0.08);
      }
      [data-theme="dark"] .nav::before {
        background: rgba(10,18,13,0.72);
      }
      [data-theme="dark"] .nav-settings {
        background: rgba(28,44,34,0.9);
        color: rgba(222,238,230,0.8);
      }
      [data-theme="dark"] .settings-menu {

      [data-theme="dark"] .menu-item:active { background: rgba(255,255,255,0.08); }

      [data-theme="dark"] .history-btn { color: var(--text-secondary); }
      [data-theme="dark"] .meal-quick-tab {
        border-color: rgba(255,255,255,0.10);

        background: rgba(255,255,255,0.05);
      }
      [data-theme="dark"] .library-list-item.selected {
        border-color: var(--green);
        background: rgba(36,179,126,0.18);
      }
      [data-theme="dark"] .library-list-check { border-color: rgba(255,255,255,0.25); }
      [data-theme="dark"] .library-chip {
        border-color: rgba(255,255,255,0.10);

      [data-theme="dark"] .library-chip.selected {

      }

      [data-theme="dark"] .text-entry-input,

      async function compressImageFile(file, options = {}) {
        const maxSide = options.maxSide || 1280;
        const quality = options.quality || 0.78;
        const mimeType = options.mimeType || "image/jpeg";
        let sourceWidth = 0;
        let sourceHeight = 0;
        let drawSource = null;

        if (typeof createImageBitmap === "function") {
          const bitmap = await createImageBitmap(file);
          sourceWidth = bitmap.width;
          sourceHeight = bitmap.height;
          drawSource = bitmap;
        } else {
          const imageUrl = URL.createObjectURL(file);
          const image = await new Promise((resolve, reject) => {
            const img = new Image();
            img.onload = () => resolve(img);
            img.onerror = reject;
            img.src = imageUrl;
          });
          sourceWidth = image.naturalWidth || image.width;
          sourceHeight = image.naturalHeight || image.height;
          drawSource = image;
          URL.revokeObjectURL(imageUrl);
        }

        const scale = Math.min(1, maxSide / Math.max(sourceWidth, sourceHeight));
        const targetWidth = Math.max(1, Math.round(sourceWidth * scale));
        const targetHeight = Math.max(1, Math.round(sourceHeight * scale));
        const canvas = document.createElement("canvas");
        canvas.width = targetWidth;
        canvas.height = targetHeight;
        const ctx = canvas.getContext("2d");
        ctx.drawImage(drawSource, 0, 0, targetWidth, targetHeight);

        const compressedBlob = await new Promise((resolve) => {
          canvas.toBlob((blob) => resolve(blob || file), mimeType, quality);
        });

        return {
          originalSize: file.size,
          compressedSize: compressedBlob.size || file.size,
          blob: compressedBlob,
          mimeType: compressedBlob.type || mimeType
        };
      }

      function normalizePortionText(rawPortion) {
        const raw = String(rawPortion || "").trim() || "1份";
        const lower = raw.toLowerCase();
        const unitMap = [
          ["milliliters", "毫升"],
          ["milliliter", "毫升"],
          ["liters", "升"],
          ["liter", "升"],
          ["grams", "克"],
          ["gram", "克"],

          ["l", "升"],
          ["kg", "千克"],
          ["g", "克"],
          ["oz", "盎司"],
          ["lb", "磅"]

        let normalized = raw;
        for (const [en, zh] of unitMap) {
          const reg = new RegExp(en, "ig");

        const compact = normalized.replace(/\s+/g, "");

        if (matched) {
          return `${matched[1]} ${matched[2]}`;
        }
        return normalized;

      function useElasticNumber(targetValue, duration = 420) {
        const safeTarget = Math.max(0, Number(targetValue) || 0);
        const [display, setDisplay] = useState(safeTarget);
        const rafRef = useRef(0);
        const startValueRef = useRef(safeTarget);
        const startTimeRef = useRef(0);

        useEffect(() => {
          const from = Number(display) || 0;
          const to = safeTarget;
          if (from === to) return;
          if (rafRef.current) cancelAnimationFrame(rafRef.current);
          startValueRef.current = from;
          startTimeRef.current = 0;

          const easeOutBack = (t) => {
            const c1 = 1.70158;
            const c3 = c1 + 1;
            return 1 + c3 * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2);
          };

          const tick = (ts) => {
            if (!startTimeRef.current) startTimeRef.current = ts;
            const elapsed = ts - startTimeRef.current;
            const progress = Math.min(1, elapsed / duration);
            const eased = easeOutBack(progress);
            const next = startValueRef.current + (to - startValueRef.current) * eased;
            setDisplay(Math.max(0, Math.round(next)));
            if (progress < 1) {
              rafRef.current = requestAnimationFrame(tick);
            }
          };

          rafRef.current = requestAnimationFrame(tick);

          return () => {
            if (rafRef.current) cancelAnimationFrame(rafRef.current);
          };
        }, [safeTarget, duration]);

        useEffect(() => {
          return () => {
            if (rafRef.current) cancelAnimationFrame(rafRef.current);
          };
        }, []);

        return display;
      }

        function commitParsedChange(updater) {
          setParsedResults((prev) => {
            const prevSnapshot = cloneParsedItems(prev);
            const nextSnapshot = cloneParsedItems(typeof updater === "function" ? updater(prevSnapshot) : updater);
            if (JSON.stringify(prevSnapshot) === JSON.stringify(nextSnapshot)) return prev;
            setParsedUndoStack((stack) => [...stack, prevSnapshot]);
            setParsedRedoStack([]);
            return nextSnapshot;
          });
        }
        function beginParsedEditSession(sessionKey) {
          const current = parsedEditSessionRef.current;
          if (current.key === sessionKey) return;
          parsedEditSessionRef.current = {
            key: sessionKey,
            before: cloneParsedItems(parsedResultsRef.current)
          };
        }
        function endParsedEditSession(sessionKey) {
          const current = parsedEditSessionRef.current;
          if (!current.key || current.key !== sessionKey) return;
          const beforeSnapshot = cloneParsedItems(current.before || []);
          const afterSnapshot = cloneParsedItems(parsedResultsRef.current);
          parsedEditSessionRef.current = { key: "", before: null };
          if (JSON.stringify(beforeSnapshot) === JSON.stringify(afterSnapshot)) return;
          setParsedUndoStack((stack) => [...stack, beforeSnapshot]);
          setParsedRedoStack([]);
        }
        function flushParsedEditSession() {
          const current = parsedEditSessionRef.current;
          if (!current.key) return;
          endParsedEditSession(current.key);
        }
        function undoParsedChange() {
          setParsedUndoStack((undoStack) => {
            if (undoStack.length === 0) return undoStack;
            const prevSnapshot = undoStack[undoStack.length - 1];
            setParsedRedoStack((redoStack) => [...redoStack, cloneParsedItems(parsedResults)]);
            setParsedResults(cloneParsedItems(prevSnapshot));
            return undoStack.slice(0, -1);
          });
        }
        function redoParsedChange() {
          setParsedRedoStack((redoStack) => {
            if (redoStack.length === 0) return redoStack;
            const nextSnapshot = redoStack[redoStack.length - 1];
            setParsedUndoStack((undoStack) => [...undoStack, cloneParsedItems(parsedResults)]);
            setParsedResults(cloneParsedItems(nextSnapshot));
            return redoStack.slice(0, -1);
          });
        }
        useEffect(() => {
          pendingDeletionRef.current = pendingDeletion;
        }, [pendingDeletion]);

        useEffect(() => {

          const prevTouchAction = document.body.style.touchAction;
          document.body.style.overflow = "hidden";
          document.body.style.touchAction = "none";
          return () => {

        function getRestHeaders(sessionArg = currentSession) {
          const token = sessionArg?.access_token;
          if (!token) return { ...SUPABASE_HEADERS };
          return { ...SUPABASE_HEADERS, Authorization: "Bearer " + token };

        function cleanupAttachments(next = attachments) {
          next.forEach((item) => {

          });

        function cloneRecords(srcRecords) {
          return srcRecords.map((record) => ({
            ...record,
            items: Array.isArray(record.items) ? record.items.map((item) => ({ ...item })) : []
          }));
        }

        function buildRecordsAfterDelete(srcRecords, recordIndex, itemIndex) {
          const next = cloneRecords(srcRecords);
          const targetRecord = next[recordIndex];
          if (!targetRecord || !Array.isArray(targetRecord.items) || !targetRecord.items[itemIndex]) return null;
          targetRecord.items.splice(itemIndex, 1);
          return next.filter((record) => Array.isArray(record.items) && record.items.length > 0);
        }

        async function initBackendState(nextUser = currentUser, nextSession = currentSession) {
          const cacheUserId = nextUser?.id || "guest";
          const cached = readCachedRecords(cacheUserId);
          if (cached.length > 0) {
            setRecords(cached);
          }
          if (!nextUser?.id) {
            if (cached.length === 0) setRecords([]);
            return;
          }
          try {
            const recordsRes = await fetch(
              SUPABASE_URL + "/rest/v1/diet_records?select=meal,items,created_at&order=created_at.asc",
              { headers: getRestHeaders(nextSession) }
            );
            if (recordsRes.ok) {
              const recRows = await recordsRes.json();
              const nextRecords = Array.isArray(recRows) ? recRows : [];
              setRecords(nextRecords);
              writeCachedRecords(nextUser.id, nextRecords);
            }
          } catch (error) {
            console.error("init-backend-failed", error);
          }
        }

        async function saveStoredRecords(nextRecords) {
          if (!currentUser?.id) throw new Error("未登录，无法保存");
          const userFilter = "?user_id=eq." + encodeURIComponent(currentUser.id);
          const response = await fetch(SUPABASE_URL + "/rest/v1/diet_records" + userFilter, {
            method: "DELETE",
            headers: getRestHeaders()
          });
          if (!response.ok) throw new Error("清空旧记录失败");
          if (nextRecords.length === 0) {
            setRecords([]);
            writeCachedRecords(currentUser.id, []);
            return;
          }
          const insertRes = await fetch(SUPABASE_URL + "/rest/v1/diet_records", {
            method: "POST",
            headers: { ...getRestHeaders(), Prefer: "return=representation" },
            body: JSON.stringify(
              nextRecords.map((record) => ({
                user_id: currentUser.id,
                meal: record.meal,
                items: Array.isArray(record.items) ? record.items : [],
                created_at: record.created_at || new Date().toISOString()
              }))
            )
          });
          if (!insertRes.ok) throw new Error("写入记录失败");
          const saved = await insertRes.json();
          const nextSaved = Array.isArray(saved) ? saved : [];
          setRecords(nextSaved);
          writeCachedRecords(currentUser.id, nextSaved);
        }

        async function pushFiles(fileList) {
          if (!fileList || fileList.length === 0) return;
          const available = Math.max(0, MAX_ATTACHMENTS - attachments.length);
          const picked = fileList.slice(0, available);
          if (picked.length === 0) return;
          const compressed = await Promise.all(picked.map((file) => compressImageFile(file)));

          setAttachments((prev) => [
            ...prev,
            ...compressed.map((item, index) => {
              const blob = item.blob;
              return {
                file: new File([blob], picked[index].name, { type: item.mimeType }),
                url: URL.createObjectURL(blob),
                originalSize: item.originalSize,
                compressedSize: item.compressedSize
              };
            })
          ]);
        }

        async function handlePickedFile(event) {
          const files = event.target.files ? Array.from(event.target.files) : [];
          try {
            await pushFiles(files);
          } catch (error) {
            console.error("compress-on-add-failed", error);
          }
          event.target.value = "";
        }

        async function startParse() {
          if (parseTaskRef.current.status === "parsing") return;
          const text = inputText.trim();
          const quickItems = buildQuickSelectedItems();
          const hasQuick = quickItems.length > 0;
          const hasAiInput = text.length > 0 || attachments.length > 0;
          if (!hasAiInput && !hasQuick) return;

          if (!hasAiInput && hasQuick) {
            applyParsedResults(quickItems);
            setParseError("");
            setParseTask(createIdleParseTask());
            setPanelMode("result");
            return;
          }

          const requestId = "parse-" + Date.now();
          const controller = new AbortController();
          parseAbortRef.current = controller;
          setIsSending(true);
          setPanelMode("result");
          setParseError("");
          setParseTask({
            status: "parsing",
            phase: "preparing",
            progressText: "正在准备解析…",
            backgrounded: false,
            startedAt: Date.now(),
            finishedAt: 0,
            requestId
          });

          try {
            updateParseTaskFor(requestId, {
              phase: "uploading",
              progressText: attachments.length > 0 ? "正在上传图片…" : "正在整理文本…"
            });
            const compressed = attachments.map((item) => ({
              blob: item.file,
              mimeType: item.file.type || "image/jpeg",
              originalSize: item.originalSize || item.file.size,
              compressedSize: item.compressedSize || item.file.size
            }));
            updateParseTaskFor(requestId, {
              phase: "recognizing",
              progressText: "AI 正在识别食物…"
            });
            const aiObject = await callDoubaoParse({
              meal: selectedMeal,
              inputText: text,
              compressedAttachments: compressed,
              signal: controller.signal,
              headers: getRestHeaders()
            });
            updateParseTaskFor(requestId, {
              phase: "normalizing",
              progressText: "正在整理结果…"
            });
            const normalized = normalizeAiItems(aiObject).map(normalizeEditableFood);
            if (normalized.length === 0 && !hasQuick) {
              const modelReason = String(aiObject?.notes || "").trim() || "模型未返回可用食物条目。";
              applyParsedResults([]);
              setParseError("解析结果不可用：\n" + modelReason);
            } else {
              applyParsedResults([...normalized, ...quickItems]);
              if (normalized.length === 0 && hasQuick) {
                setParseError("AI 未识别到新食物，已保留所选快捷项。");
              } else {
                setParseError("");
              }
            }
            setPanelMode("result");
            updateParseTaskFor(requestId, {
              status: "success",
              progressText: "解析完成",
              finishedAt: Date.now()
            });
          } catch (error) {
            if (error?.name === "AbortError") {
              updateParseTaskFor(requestId, {
                status: "canceled",
                progressText: "已取消解析",
                finishedAt: Date.now()
              });
              return;
            }
            console.error("parse-failed", error);
            if (hasQuick) {
              applyParsedResults(quickItems);
              setParseError("AI 解析失败，已保留所选快捷项。");
            } else {
              applyParsedResults([]);
              setParseError("解析失败：\n" + (error?.message || "未知错误"));
            }
            setPanelMode("result");
            updateParseTaskFor(requestId, {
              status: "error",
              progressText: "解析失败，可重试",
              finishedAt: Date.now()
            });
          } finally {
            setIsSending(false);
            if (parseAbortRef.current === controller) parseAbortRef.current = null;
          }
        }

        async function saveEditingEntry() {
          if (!editingEntry || !editingItem) return;
          flushEntryEditSession();
          const selectedMeal = MEALS.includes(editingMeal) ? editingMeal : "早餐";
          const next = cloneRecords(records);
          const record = next[editingEntry.recordIndex];
          if (!record || !Array.isArray(record.items) || !record.items[editingEntry.itemIndex]) return;
          const nextItem = buildStoredItemFromEditable(editingItem);
          if (record.meal === selectedMeal) {
            record.items[editingEntry.itemIndex] = nextItem;
          } else {
            record.items.splice(editingEntry.itemIndex, 1);
            if (record.items.length === 0) {
              next.splice(editingEntry.recordIndex, 1);
            }
            const createdAt = record.created_at || new Date().toISOString();
            const sameMealRecord = next.find((row) => row?.meal === selectedMeal && getDateKey(row?.created_at) === getDateKey(createdAt));
            if (sameMealRecord && Array.isArray(sameMealRecord.items)) {
              sameMealRecord.items.push(nextItem);
            } else {
              next.push({
                meal: selectedMeal,
                items: [nextItem],
                created_at: createdAt
              });
            }
          }
          try {
            await saveStoredRecords(next);
            closeEntryEdit();
          } catch (error) {
            console.error("save-entry-edit-failed", error);
          }

              nextAttachmentsRaw.map(async (item, idx) => {

                  dataUrl,
                  String(item?.name || `draft-${idx + 1}.jpg`),
                  String(item?.mimeType || "image/jpeg")
                );
                return {
                  file,
                  url: dataUrl,
                  originalSize: Number(item?.originalSize) || file.size,
                  compressedSize: Number(item?.compressedSize) || file.size
                };

            );

            setAttachments(nextAttachments);

            if (MEALS.includes(draftMeal)) setSelectedMeal(draftMeal);
            const draftQuickFoods = Array.isArray(draft.selectedQuickFoods) ? draft.selectedQuickFoods : [];

        function removeAttachmentAt(index) {
          const snapshot = attachments;
          const target = snapshot[index];
          if (!target) return;
          URL.revokeObjectURL(target.url);
          setAttachments((prev) => prev.filter((_, i) => i !== index));
          if (!imagePreviewOpen) return;
          if (snapshot.length <= 1) {
            setImagePreviewOpen(false);
            setImagePreviewIndex(0);
            return;
          }
          if (index < imagePreviewIndex) {
            setImagePreviewIndex((prev) => Math.max(0, prev - 1));
          } else if (index === imagePreviewIndex) {
            setImagePreviewIndex((prev) => {
              const nextLen = snapshot.length - 1;
              return Math.min(prev, nextLen - 1);
